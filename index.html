<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>FLOWW CART | Continuity Master</title>
    <script src="https://unpkg.com/feather-icons"></script>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Heebo:wght@300;400;700;800;900&display=swap">
    <style>
        :root {
            --glass: rgba(15, 23, 42, 0.98);
            --border: rgba(255, 255, 255, 0.1);
            --accent: #6366f1;
            --success: #10b981;
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
        }
        * { box-sizing: border-box; font-family: 'Heebo', sans-serif; margin: 0; padding: 0; outline: none; -webkit-tap-highlight-color: transparent; }
        body { background: radial-gradient(circle at 5% 5%, #1e1b4b 0%, #0f172a 50%, #000 100%); color: var(--text-main); min-height: 100vh; overflow: hidden; display: flex; justify-content: center; align-items: center; }
        
        @keyframes popIn { 0% { transform: scale(0.5); opacity: 0; } 100% { transform: scale(1); opacity: 1; } }
        @keyframes vacuumOut { 100% { transform: scale(0) translateX(300px) rotate(45deg); opacity: 0; } }

        .screen { position: absolute; inset: 0; display: none; padding: 15px; align-items: center; justify-content: center; flex-direction: column; opacity: 0; transition: 0.4s cubic-bezier(0.23, 1, 0.32, 1); }
        .screen.active { display: flex; opacity: 1; z-index: 10; }
        .elite-card { background: var(--glass); backdrop-filter: blur(50px); width: 100%; max-width: 440px; height: 94vh; padding: 30px 20px; border-radius: 40px; border: 1px solid var(--border); box-shadow: 0 50px 150px rgba(0,0,0,0.9); display: flex; flex-direction: column; overflow-y: auto; scrollbar-width: none; }

        .gradient-title { background: linear-gradient(135deg, #a78bfa, #c084fc); -webkit-background-clip: text; -webkit-text-fill-color: transparent; font-weight: 900; font-size: 38px; line-height: 1.1; text-align: center; }
        .btn { background: linear-gradient(135deg, #4f46e5, #7c3aed); border: none; color: white; border-radius: 20px; padding: 18px; font-weight: 800; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 10px; font-size: 16px; width: 100%; }
        
        .cat-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; width: 100%; margin-top: 25px; }
        .cat-card { background: rgba(255,255,255,0.02); border: 1px solid var(--border); padding: 22px 10px; border-radius: 28px; cursor: pointer; text-align: center; transition: 0.3s; position: relative; }
        .cat-card .badge { position: absolute; top: 10px; left: 10px; background: var(--accent); color: white; border-radius: 50%; width: 20px; height: 20px; font-size: 11px; display: flex; align-items: center; justify-content: center; }

        .item-row { background: rgba(255,255,255,0.03); padding: 16px 20px; border-radius: 22px; display: flex; justify-content: space-between; align-items: center; border: 1px solid var(--border); margin-bottom: 12px; cursor: pointer; }
        .item-row.collected { opacity: 0.4; border-style: dashed; }
        .check-btn { width: 30px; height: 30px; border-radius: 10px; border: 2px solid var(--accent); display: flex; align-items: center; justify-content: center; color: var(--accent); pointer-events: none; }
        .check-btn.active { background: var(--accent); color: white; }
        .vacuum { animation: vacuumOut 0.4s forwards ease-in; }

        .history-card { background: rgba(255,255,255,0.02); border: 1px solid var(--border); padding: 18px; border-radius: 25px; margin-bottom: 12px; cursor: pointer; border-right: 4px solid var(--accent); }
        .detail-overlay { position: absolute; inset: 0; background: var(--glass); z-index: 2000; border-radius: 40px; padding: 30px 20px; display: none; flex-direction: column; }

        .overlay-victory { position: absolute; inset: 0; background: rgba(15, 23, 42, 0.99); display: none; flex-direction: column; justify-content: center; align-items: center; gap: 20px; z-index: 5000; padding: 40px; border-radius: 40px; text-align: center; }
        .success-icon-container { width: 220px; height: 220px; position: relative; animation: popIn 0.8s cubic-bezier(0.175, 0.885, 0.32, 1.275); }
        .big-cart { width: 100%; height: 100%; filter: drop-shadow(0 0 30px var(--accent)); }
        .big-check { position: absolute; top: 20%; left: 35%; width: 90px; height: 90px; stroke: var(--success); stroke-width: 10; stroke-linecap: round; }

        .smart-form { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 15px; margin-top: 45px; }
        select, input { background: rgba(0,0,0,0.5); border: 1px solid var(--border); border-radius: 15px; padding: 12px; color: white; text-align: right; width: 100%; font-weight: 700; }
        
        .secondary-btn { background: rgba(255,255,255,0.05); border: 1px solid var(--border); padding: 14px; border-radius: 15px; cursor: pointer; color: var(--text-muted); font-weight: 700; width: 100%; display: flex; align-items: center; justify-content: center; gap: 8px; margin-bottom: 10px; }
    </style>
</head>
<body>

<div id="screen-welcome" class="screen active">
    <div class="elite-card">
        <h1 class="gradient-title">FLOWW CART</h1>
        <p style="margin: 30px 0; text-align: center; color: var(--text-muted);">הזן שם להמשך עבודה חכמה:</p>
        <input type="text" id="user-name" placeholder="השם שלך..." style="background: rgba(0,0,0,0.5); border: 1px solid var(--border); border-radius: 20px; padding: 20px; color: white; text-align: center; font-size: 18px; margin-bottom: 25px; width: 100%;">
        <button class="btn" onclick="initUser()">כניסה למערכת <i data-feather="arrow-left"></i></button>
    </div>
</div>

<div id="screen-menu" class="screen">
    <div class="elite-card">
        <h2 id="hello-txt" class="gradient-title">שלום!</h2>
        <div id="category-grid" class="cat-grid">
            </div>
        <div style="margin-top: 25px;">
            <div class="secondary-btn" onclick="showScreen('screen-history')"><i data-feather="archive"></i> היסטוריית רשימות</div>
            <button class="btn" style="background: rgba(255,255,255,0.05); margin-top: 15px;" onclick="logout()">החלף משתמש</button>
        </div>
    </div>
</div>

<div id="screen-history" class="screen">
    <div class="elite-card">
        <h2 class="gradient-title" style="font-size: 28px;">ארכיון רשימות</h2>
        <div id="history-container" style="flex:1; overflow-y: auto; margin: 20px 0;"></div>
        <button class="btn" onclick="showScreen('screen-menu')">חזרה לתפריט</button>
        
        <div id="detail-overlay" class="detail-overlay">
            <h2 id="det-title" class="gradient-title">פרטים</h2>
            <p id="det-date" style="text-align:center; color:var(--text-muted); margin-bottom: 20px;"></p>
            <div id="det-items" style="flex:1; overflow-y: auto;"></div>
            <button class="btn" id="resume-btn" style="margin-bottom: 10px; background: var(--accent);">המשך רשימה זו</button>
            <button class="btn" style="background: rgba(255,255,255,0.05);" onclick="closeDetails()">סגור</button>
        </div>
    </div>
</div>

<div id="screen-list" class="screen">
    <div class="elite-card">
        <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px;">
            <i data-feather="share-2" onclick="doShare()" style="color: var(--success); cursor: pointer;"></i>
            <h2 id="cat-title" class="gradient-title" style="font-size: 22px;">רשימה</h2>
            <i data-feather="chevron-left" onclick="showScreen('screen-menu')" style="color: var(--accent); cursor: pointer;"></i>
        </div>
        <div class="smart-form">
            <div style="display:flex; flex-direction:column;"><label style="font-size:11px;">מחלקה</label><select id="item-dept" onchange="updateSuggestions()" style="background: rgba(0,0,0,0.5); color:white; border-radius:15px; padding:10px;"></select></div>
            <div style="display:flex; flex-direction:column;"><label style="font-size:11px;">הצעות</label><select id="item-suggest" onchange="syncSuggest()" style="background: rgba(0,0,0,0.5); color:white; border-radius:15px; padding:10px;"></select></div>
            <div style="grid-column: span 2;"><input type="text" id="item-name" placeholder="מה חסר?..." style="background: rgba(0,0,0,0.5); color:white; border-radius:15px; padding:15px; width:100%;"></div>
        </div>
        <button class="btn" onclick="addItem()" style="margin-bottom: 12px;">הוסף לרשימה</button>
        <div style="flex:1; overflow-y: auto;">
            <div id="items-list"></div>
            <div id="collected-list" style="margin-top: 20px; border-top: 1px solid var(--border); padding-top: 10px;"></div>
        </div>

        <div id="success-overlay" class="overlay-victory">
            <div class="success-icon-container">
                <svg class="big-cart" viewBox="0 0 100 100" fill="none"><path d="M20 20H25L32 60C32.5 62.2 34.5 64 36.8 64H80.2C82.5 64 84.5 62.2 85 60L90 32.5H35" stroke="url(#g1)" stroke-width="3" stroke-linecap="round"/><circle cx="38" cy="80" r="5" fill="#818cf8"/><circle cx="78" cy="80" r="5" fill="#c084fc"/><defs><linearGradient id="g1"><stop stop-color="#818cf8"/><stop offset="1" stop-color="#c084fc"/></linearGradient></defs></svg>
                <svg class="big-check" viewBox="0 0 100 100" fill="none"><path d="M20 50L45 75L85 25" stroke="#10b981" stroke-width="10" stroke-linecap="round" stroke-linejoin="round"/></svg>
            </div>
            <h2 class="gradient-title">הכל נאסף!</h2>
            <button class="btn" onclick="handleNewList()" style="background: var(--success); margin-top: 20px;">רשימה חדשה</button>
            <button class="btn" style="background: rgba(255,255,255,0.05); margin-top: 10px;" onclick="toggleOverlay('success-overlay', false)">סגור</button>
        </div>
    </div>
</div>

<script>
    const MASTER_CONFIG = {
        'סופר': { icon: 'shopping-cart', depts: ['🥛 חלב', '🥩 בשר', '🥦 ירקות', '🥖 מאפה'] },
        'פארם': { icon: 'heart', depts: ['🧼 היגיינה', '💊 תרופות'] },
        'בית': { icon: 'home', depts: ['🧹 ניקיון', '🧺 כביסה'] },
        'אירוע': { icon: 'star', depts: ['🥨 חטיפים', '🍷 אלכוהול'] },
        'חשמל': { icon: 'zap', depts: ['🔌 כבלים', '💻 אביזרים'] },
        'כללי': { icon: 'list', depts: ['📝 משימות', '📌 אחר'] }
    };

    let user = ""; let activeCat = "";

    window.onload = () => {
        user = localStorage.getItem('floww_u');
        if(user) { updateGreet(); renderCategories(); showScreen('screen-menu'); }
        feather.replace();
    };

    function initUser() {
        user = document.getElementById('user-name').value.trim();
        if(!user) return;
        localStorage.setItem('floww_u', user);
        updateGreet(); renderCategories(); showScreen('screen-menu');
    }

    function updateGreet() {
        const h = new Date().getHours();
        let m = (h >= 5 && h < 12) ? "בוקר טוב" : (h >= 12 && h < 18) ? "צהריים טובים" : (h >= 18 && h < 22) ? "ערב טוב" : "לילה טוב";
        document.getElementById('hello-txt').innerText = `${m}, ${user} ✨`;
    }

    function renderCategories() {
        const grid = document.getElementById('category-grid');
        grid.innerHTML = "";
        Object.keys(MASTER_CONFIG).forEach(cat => {
            const its = JSON.parse(localStorage.getItem(`fc_${user}_${cat}`) || "[]");
            const unfinished = its.filter(i => !i.collected).length;
            const card = document.createElement('div');
            card.className = "cat-card";
            card.onclick = () => openList(cat);
            card.innerHTML = `
                ${unfinished > 0 ? `<div class="badge">${unfinished}</div>` : ''}
                <i data-feather="${MASTER_CONFIG[cat].icon}"></i><br>
                <span>${cat}</span>
            `;
            grid.appendChild(card);
        });
        feather.replace();
    }

    function showScreen(id) {
        if(id === 'screen-menu' && activeCat) { archiveCurrentList(); renderCategories(); }
        document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
        document.getElementById(id).classList.add('active');
        if(id === 'screen-history') renderHistoryList();
        feather.replace();
    }

    function openList(cat) {
        activeCat = cat;
        document.getElementById('cat-title').innerText = `רשימת ${cat}`;
        const ds = document.getElementById('item-dept');
        ds.innerHTML = "";
        MASTER_CONFIG[cat].depts.forEach(d => {
            const o = document.createElement('option'); o.value = d; o.innerText = d; ds.appendChild(o);
        });
        updateSuggestions(); render(); showScreen('screen-list');
    }

    function updateSuggestions() {
        const d = document.getElementById('item-dept').value;
        const s = document.getElementById('item-suggest');
        s.innerHTML = '<option value="">בחר מהמאגר...</option>';
        const sharedDB = JSON.parse(localStorage.getItem('floww_shared_db') || "{}");
        if(sharedDB[activeCat] && sharedDB[activeCat][d]) {
            sharedDB[activeCat][d].forEach(p => { s.innerHTML += `<option value="${p}">${p}</option>`; });
        }
    }

    function syncSuggest() { const s = document.getElementById('item-suggest'); if(s.value) document.getElementById('item-name').value = s.value; }

    function addItem() {
        const ni = document.getElementById('item-name');
        let rawName = ni.value.trim();
        if(!rawName) return;
        const cleanName = rawName.replace(/\s+/g, ' '); 
        saveToSharedDB(activeCat, document.getElementById('item-dept').value, cleanName);
        let its = JSON.parse(localStorage.getItem(`fc_${user}_${activeCat}`) || "[]");
        its.push({ id: Date.now(), txt: cleanName, collected: false });
        localStorage.setItem(`fc_${user}_${activeCat}`, JSON.stringify(its));
        ni.value = ""; render(); archiveCurrentList();
    }

    function saveToSharedDB(cat, dept, item) {
        let db = JSON.parse(localStorage.getItem('floww_shared_db') || "{}");
        if(!db[cat]) db[cat] = {}; if(!db[cat][dept]) db[cat][dept] = [];
        if(!db[cat][dept].includes(item)) { db[cat][dept].push(item); localStorage.setItem('floww_shared_db', JSON.stringify(db)); }
    }

    // --- מערכת המשכיות וארכיון ---
    function handleNewList() { archiveCurrentList(); localStorage.setItem(`fc_${user}_${activeCat}`, "[]"); render(); toggleOverlay('success-overlay', false); showScreen('screen-menu'); }

    function archiveCurrentList() {
        let its = JSON.parse(localStorage.getItem(`fc_${user}_${activeCat}`) || "[]");
        if(its.length === 0) return;
        let history = JSON.parse(localStorage.getItem(`floww_history_${user}`) || "[]");
        // מעדכן את הרשימה האחרונה אם היא מאותה קטגוריה וחדשה מאוד, אחרת יוצר חדשה
        history.push({ id: Date.now(), cat: activeCat, date: new Date().toLocaleString('he-IL'), items: [...its] });
        localStorage.setItem(`floww_history_${user}`, JSON.stringify(history));
    }

    function renderHistoryList() {
        const container = document.getElementById('history-container');
        container.innerHTML = "";
        let history = JSON.parse(localStorage.getItem(`floww_history_${user}`) || "[]");
        history.reverse().forEach(h => {
            const row = document.createElement('div');
            row.className = "history-card";
            row.onclick = () => openHistoryDetails(h.id);
            row.innerHTML = `<div style="display:flex; justify-content:space-between; align-items:center;"><div><strong>${h.cat}</strong><br><small>${h.date}</small></div><i data-feather="trash-2" style="width:18px; color:red;" onclick="event.stopPropagation(); deleteHistoryItem(${h.id})"></i></div>`;
            container.appendChild(row);
        });
        feather.replace();
    }

    function openHistoryDetails(id) {
        const history = JSON.parse(localStorage.getItem(`floww_history_${user}`) || "[]");
        const h = history.find(x => x.id === id);
        if(!h) return;
        document.getElementById('det-title').innerText = `רשימת ${h.cat}`;
        document.getElementById('det-date').innerText = h.date;
        const itemsDiv = document.getElementById('det-items');
        itemsDiv.innerHTML = h.items.map(i => `<div class="item-row" style="cursor:default;"><div style="display:flex; align-items:center; gap:12px;"><div class="check-btn ${i.collected ? 'active' : ''}"><i data-feather="check" style="width:14px;"></i></div><span>${i.txt}</span></div></div>`).join('');
        
        document.getElementById('resume-btn').onclick = () => {
            if(confirm(`להחליף את הרשימה הנוכחית ב${h.cat} ברשימה זו?`)) {
                localStorage.setItem(`fc_${user}_${h.cat}`, JSON.stringify(h.items));
                closeDetails();
                openList(h.cat);
            }
        };
        
        document.getElementById('detail-overlay').style.display = "flex";
        feather.replace();
    }

    function closeDetails() { document.getElementById('detail-overlay').style.display = "none"; }
    function deleteHistoryItem(id) { if(confirm("למחוק מהארכיון?")) { let h = JSON.parse(localStorage.getItem(`floww_history_${user}`) || "[]"); localStorage.setItem(`floww_history_${user}`, JSON.stringify(h.filter(x => x.id !== id))); renderHistoryList(); } }

    function render() {
        const l = document.getElementById('items-list'); const cl = document.getElementById('collected-list');
        l.innerHTML = ""; cl.innerHTML = "";
        let its = JSON.parse(localStorage.getItem(`fc_${user}_${activeCat}`) || "[]");
        its.reverse().forEach(i => {
            const r = document.createElement('div');
            r.className = `item-row ${i.collected ? 'collected' : ''}`;
            r.onclick = () => toggleCollect(i.id);
            r.innerHTML = `<div style="display:flex; align-items:center; gap:12px;"><div class="check-btn ${i.collected ? 'active' : ''}"><i data-feather="check" style="width:14px;"></i></div><span style="font-weight:700;">${i.txt}</span></div><i data-feather="trash-2" style="width:18px;" onclick="event.stopPropagation(); removeItem(${i.id}, this);"></i>`;
            if(i.collected) cl.appendChild(r); else l.appendChild(r);
        });
        feather.replace();
    }

    function toggleCollect(id) {
        let its = JSON.parse(localStorage.getItem(`fc_${user}_${activeCat}`) || "[]");
        const i = its.find(x => x.id === id); if(i) i.collected = !i.collected;
        localStorage.setItem(`fc_${user}_${activeCat}`, JSON.stringify(its));
        render();
        if(its.length > 0 && its.every(x => x.collected)) { setTimeout(() => { toggleOverlay('success-overlay', true); }, 400); }
    }

    function removeItem(id, el) { 
        el.closest('.item-row').classList.add('vacuum');
        setTimeout(() => { 
            let its = JSON.parse(localStorage.getItem(`fc_${user}_${activeCat}`) || "[]"); 
            localStorage.setItem(`fc_${user}_${activeCat}`, JSON.stringify(its.filter(x => x.id !== id))); 
            render(); 
        }, 400); 
    }

    function toggleOverlay(id, s) { document.getElementById(id).style.display = s ? 'flex' : 'none'; feather.replace(); }
    function logout() { localStorage.removeItem('floww_u'); location.reload(); }
    function doShare() {
        let its = JSON.parse(localStorage.getItem(`fc_${user}_${activeCat}`) || "[]");
        let t = `*FLOWW CART - ${activeCat}*\n`;
        its.forEach(i => t += `${i.collected ? '✅' : '🔹'} ${i.txt}\n`);
        window.open(`https://wa.me/?text=${encodeURIComponent(t)}`);
    }
</script>
</body>
</html>
