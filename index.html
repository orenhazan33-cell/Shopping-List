<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>הקניות של אורן - גרסה מלאה</title>
    <link rel="manifest" href="./manifest.json">
    <meta name="theme-color" content="#4a90e2">
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
    <style>
        :root { --primary: #4a90e2; --secondary: #2ecc71; --danger: #e74c3c; --share: #6c5ce7; }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { font-family: 'Segoe UI', system-ui, sans-serif; margin: 0; padding-bottom: 110px; background: #f4f7f9; direction: rtl; text-align: right; }
        
        /* מסך ברוכים הבאים */
        .modal-overlay { position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.85); z-index: 3000; display: none; align-items: center; justify-content: center; }
        .welcome-card { background: white; width: 92%; max-width: 400px; border-radius: 25px; padding: 25px; text-align: center; box-shadow: 0 15px 35px rgba(0,0,0,0.2); }
        .feature-item { display: flex; align-items: center; gap: 12px; margin-bottom: 12px; text-align: right; font-size: 14px; }
        
        .btn { padding: 12px; border: none; border-radius: 12px; cursor: pointer; font-weight: bold; font-size: 16px; transition: 0.2s; }
        .btn-install { background: var(--secondary); color: white; width: 100%; margin-bottom: 10px; }
        .btn-start { background: var(--primary); color: white; width: 100%; }
        .btn-add { background: var(--primary); color: white; flex: 2; }
        .btn-share { background: var(--share); color: white; font-size: 13px; width: 100%; margin-top: 10px; }

        .top-nav { background: white; padding: 10px; display: flex; gap: 10px; box-shadow: 0 2px 8px rgba(0,0,0,0.1); position: sticky; top: 0; z-index: 1000; }
        .app-container { width: 95%; max-width: 500px; margin: 15px auto; }
        .control-panel { background: white; border-radius: 20px; padding: 18px; box-shadow: 0 8px 25px rgba(0,0,0,0.05); border-top: 5px solid var(--primary); }
        
        .input-group { display: flex; flex-direction: column; gap: 10px; margin-top: 15px; }
        .row { display: flex; gap: 8px; align-items: center; }
        select, input { padding: 12px; border: 2px solid #f0f0f0; border-radius: 12px; font-size: 16px; outline: none; flex: 1; text-align: right; }
        
        ul { list-style: none; padding: 0; margin: 20px 0; }
        li { background: white; margin-bottom: 8px; padding: 15px; border-radius: 15px; display: flex; align-items: center; justify-content: space-between; border-right: 6px solid var(--primary); box-shadow: 0 2px 5px rgba(0,0,0,0.03); }
        .collected { opacity: 0.4; text-decoration: line-through; filter: grayscale(1); background: #f8f8f8 !important; }

        .budget-bar { position: fixed; bottom: 0; left: 0; right: 0; background: #2c3e50; color: white; padding: 15px; display: flex; justify-content: space-around; font-weight: bold; z-index: 1001; }
        
        /* השלמה אוטומטית */
        .suggestions-box { position: absolute; background: white; width: 100%; border-radius: 10px; box-shadow: 0 5px 15px rgba(0,0,0,0.1); z-index: 2000; display: none; margin-top: 45px; }
        .suggestion-item { padding: 10px; border-bottom: 1px solid #eee; cursor: pointer; }
    </style>
</head>
<body>

    <div id="welcomeModal" class="modal-overlay">
        <div class="welcome-card">
            <h2 style="color: var(--primary); margin-top: 0;">היי! ברוכים הבאים 👋</h2>
            <div class="feature-item"><span>🧠</span> <strong>למידה עצמית:</strong> המערכת זוכרת מחירים ומוצרים.</div>
            <div class="feature-item"><span>🔔</span> <strong>תזכורת שכחה:</strong> תקבלו התראה אם מוצר עומד להיגמר.</div>
            <div class="feature-item"><span>📊</span> <strong>ניהול תקציב:</strong> חישוב עלות הסל בזמן אמת.</div>
            <div class="feature-item"><span>👥</span> <strong>שיתוף:</strong> סנכרון מלא עם כל בני הבית.</div>
            
            <hr style="border: 0; border-top: 1px solid #eee; margin: 15px 0;">
            
            <button id="installBtn" class="btn btn-install" onclick="installPWA()">📲 התקן אפליקציה למסך הבית</button>
            <button class="btn btn-start" onclick="closeWelcome()">בואו ניכנס</button>
        </div>
    </div>

    <div class="top-nav">
        <select id="myListsDropdown" onchange="switchList(this.value)" style="flex:1; border-radius: 10px;"></select>
        <button class="btn" style="background: var(--secondary); color: white; padding: 0 15px;" onclick="showNewList()">+</button>
    </div>

    <div class="app-container">
        <div class="control-panel">
            <input type="text" id="listNameInput" style="font-size:20px; font-weight:bold; border:none; width:100%; outline:none;" onblur="saveListName(this.value)">
            
            <div class="input-group">
                <div class="row">
                    <select id="itemCat"></select>
                    <input type="number" id="itemPrice" placeholder="₪ מחיר" style="max-width: 90px;">
                </div>
                <div class="row" style="position: relative;">
                    <input type="text" id="itemInput" placeholder="מה קונים?" oninput="handleAuto(this.value)" autocomplete="off">
                    <div id="suggestions" class="suggestions-box"></div>
                    <input type="number" id="itemQty" value="1" style="max-width: 60px;">
                </div>
                <button class="btn btn-add" onclick="addItem()">הוסף לרשימה</button>
                <button class="btn btn-share" onclick="shareCurrentList()">📤 שתף רשימה עם בני הבית</button>
            </div>
        </div>

        <h4 style="margin:20px 5px 10px; color:#666;">⏳ צריך לקנות</h4>
        <ul id="shoppingList"></ul>
        
        <h4 style="margin:20px 5px 10px; color:#666;">✅ כבר בסל</h4>
        <ul id="collectedList"></ul>
    </div>

    <div class="budget-bar">
        <div>צפי: <span id="sumP">0</span> ₪</div>
        <div>בסל: <span id="sumC">0</span> ₪</div>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyCb7dApdjqPB6Fip9rW-QxoNbTZBow6rkQ",
            authDomain: "shopping-list-7c4fa.firebaseapp.com",
            databaseURL: "https://shopping-list-7c4fa-default-rtdb.europe-west1.firebasedatabase.app",
            projectId: "shopping-list-7c4fa",
            storageBucket: "shopping-list-7c4fa.firebasestorage.app",
            messagingSenderId: "482760938255",
            appId: "1:482760938255:web:99e0dd53cb822a8327e47a"
        };
        firebase.initializeApp(firebaseConfig);
        const database = firebase.database();
        let currentListId = new URLSearchParams(window.location.search).get('list') || (JSON.parse(localStorage.getItem('myLists')) || ['list_general'])[0];
        let deferredPrompt;

        const prices = { "חלב": 6.5, "ביצים": 13, "לחם": 8, "עוף": 35, "עגבניה": 6, "מלפפון": 5 };

        window.addEventListener('beforeinstallprompt', (e) => { e.preventDefault(); deferredPrompt = e; });

        window.onload = function() {
            if (!localStorage.getItem('welcomeShown')) {
                document.getElementById('welcomeModal').style.display = 'flex';
            }
            init();
        };

        function closeWelcome() {
            localStorage.setItem('welcomeShown', 'true');
            document.getElementById('welcomeModal').style.display = 'none';
        }

        function init() {
            database.ref('all_lists/'+currentListId+'/metadata').on('value', s => {
                const meta = s.val() || { name: "רשימה כללית", type: "super" };
                document.getElementById('listNameInput').value = meta.name;
                const cats = { super: {meat:"🥩 בשר", dairy:"🥛 חלב", veg:"🥦 ירקות", gen:"📦 כללי"} };
                document.getElementById('itemCat').innerHTML = Object.entries(cats.super).map(([k,v]) => `<option value="${k}">${v}</option>`).join('');
            });
            database.ref('all_lists/'+currentListId+'/items').on('value', s => render(s.val()));
            updateDrop();
        }

        function handleAuto(v) {
            const box = document.getElementById('suggestions');
            if(v.length < 1) { box.style.display = 'none'; return; }
            const filtered = Object.keys(prices).filter(k => k.includes(v));
            if(filtered.length >
