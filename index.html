<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>הקניות של אורן - Enterprise v4.0</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
    <style>
        :root { --primary: #0984e3; --secondary: #00b894; --danger: #ff4757; --dark: #0f1419; }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        
        body { font-family: 'Segoe UI', system-ui, sans-serif; margin: 0; padding-bottom: 120px; min-height: 100vh; background-color: var(--dark); background-attachment: fixed; background-size: cover; background-position: center; direction: rtl; transition: background 0.8s ease; overflow-x: hidden; }
        
        /* ערכות נושא */
        body.theme-super { background-image: linear-gradient(rgba(15,20,25,0.7), rgba(15,20,25,0.9)), url('https://images.unsplash.com/photo-1542838132-92c53300491e?auto=format&fit=crop&w=1080&q=80'); }
        body.theme-ikea { background-image: linear-gradient(rgba(0,88,163,0.75), rgba(0,88,163,0.95)), url('https://images.unsplash.com/photo-1555041469-a586c61ea9bc?auto=format&fit=crop&w=1080&q=80'); }
        body.theme-ksp { background-image: linear-gradient(rgba(15,25,45,0.8), rgba(15,25,45,0.95)), url('https://images.unsplash.com/photo-1550745165-9bc0b252726f?auto=format&fit=crop&w=1080&q=80'); }
        body.theme-birthday { background-image: linear-gradient(rgba(30,15,30,0.7), rgba(30,15,30,0.9)), url('https://images.unsplash.com/photo-1530103862676-de8892bf309c?auto=format&fit=crop&w=1080&q=80'); }
        body.theme-general { background-image: linear-gradient(rgba(45,52,54,0.75), rgba(45,52,54,0.9)), url('https://images.unsplash.com/photo-1472851294608-062f824d29cc?auto=format&fit=crop&w=1080&q=80'); }

        .top-nav { background: rgba(15, 20, 25, 0.96); backdrop-filter: blur(25px); border-bottom: 1px solid rgba(255,255,255,0.1); padding: 15px 20px; position: sticky; top: 0; z-index: 1000; display: flex; align-items: center; justify-content: space-between; box-shadow: 0 10px 40px rgba(0,0,0,0.6); }
        #myListsDropdown { flex: 1; font-weight: 900; border: none; background: transparent; font-size: 19px; color: #fff; outline: none; appearance: none; }

        /* הנפשות ווקום ופריסה */
        @keyframes vacuumEffect {
            0% { transform: perspective(1000px) rotateX(0deg) scale(1) translateY(0); opacity: 1; filter: blur(0); }
            100% { transform: perspective(1000px) rotateX(-90deg) scale(0.1) translateY(400px); opacity: 0; filter: blur(15px); }
        }
        @keyframes listPop {
            0% { transform: scale(0.5) translateY(50px); opacity: 0; }
            20% { transform: scale(1.1) translateY(0); opacity: 1; }
            80% { transform: scale(1); opacity: 1; }
            100% { transform: scale(1.2) translateY(-30px); opacity: 0; }
        }
        
        .vacuum-out { animation: vacuumEffect 0.6s cubic-bezier(0.5, 0, 0.75, 0) forwards; }
        .item-vacuum { animation: vacuumEffect 0.5s ease-in forwards !important; transform-origin: top center; }

        .app-container { width: 94%; max-width: 500px; margin: 25px auto; transition: opacity 0.3s; }
        .control-panel { background: linear-gradient(135deg, rgba(30, 39, 46, 0.98), rgba(45, 52, 54, 0.98)); border: 1px solid rgba(255,255,255,0.15); border-radius: 30px; padding: 25px; box-shadow: 0 25px 50px rgba(0,0,0,0.6); color: white; margin-bottom: 30px; }
        
        li { background: rgba(255,255,255,0.98); margin-bottom: 12px; padding: 20px; border-radius: 20px; display: flex; align-items: center; justify-content: space-between; border-right: 8px solid var(--primary); transform-origin: top center; transition: 0.3s; }
        li.category-header { background: rgba(0,0,0,0.85); color: white; border-right: 6px solid var(--secondary); padding: 8px 18px; border-radius: 15px; font-size: 14px; font-weight: 900; margin: 35px 0 12px; width: fit-content; }
        
        /* Badge Feedback */
        #animation-container { position: fixed; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 9999; display: flex; justify-content: center; align-items: center; }
        .feedback-badge { background: rgba(255,255,255,0.95); padding: 30px; border-radius: 40px; text-align: center; box-shadow: 0 20px 60px rgba(0,0,0,0.5); animation: listPop 2.5s cubic-bezier(0.17, 0.84, 0.44, 1) forwards; border: 4px solid var(--primary); }
        .feedback-icon { font-size: 60px; margin-bottom: 15px; display: block; }
        .feedback-title { font-size: 24px; font-weight: 900; color: #2d3436; margin: 0; }

        .cart-trigger { position: fixed; bottom: 0; left: 0; right: 0; background: linear-gradient(135deg, #0984e3, #6c5ce7); padding: 20px 25px; display: flex; align-items: center; justify-content: space-between; border-radius: 30px 30px 0 0; z-index: 4000; color: white; cursor: pointer; font-weight: 900; }
        .cart-sheet { position: fixed; bottom: 0; left: 0; right: 0; height: 80vh; background: #161d27; z-index: 5000; transform: translateY(100%); transition: transform 0.5s cubic-bezier(0.2, 1, 0.3, 1); border-radius: 35px 35px 0 0; display: flex; flex-direction: column; }
        .cart-sheet.open { transform: translateY(0); }
        .cart-scroll { flex: 1; overflow-y: auto; padding: 20px 20px 120px; }
    </style>
</head>
<body class="theme-general">
    <div id="animation-container"></div>
    <div id="toast" style="position:fixed; top:-100px; left:50%; transform:translateX(-50%); background:#1e272e; color:white; padding:15px 30px; border-radius:30px; z-index:8000; transition:0.4s; font-weight:900;"></div>

    <div id="nameModal" style="position:fixed; top:0; left:0; right:0; bottom:0; background:rgba(0,0,0,0.95); z-index:10000; display:none; align-items:center; justify-content:center; backdrop-filter:blur(10px);">
        <div style="background:white; width:90%; max-width:400px; padding:35px; border-radius:35px; text-align:center;">
            <h2 style="color:var(--primary); margin:0; font-size:28px;">שלום! 👋</h2>
            <p style="color:#636e72; margin-bottom:25px;">מי משתמש באפליקציה כרגע?</p>
            <input type="text" id="userNameInput" placeholder="השם שלך..." style="width:100%; padding:15px; border:2px solid #eee; border-radius:15px; text-align:center; font-size:18px; margin-bottom:20px;">
            <button onclick="saveUser()" style="width:100%; padding:18px; border:none; background:var(--primary); color:white; border-radius:18px; font-weight:900; font-size:18px;">התחל</button>
        </div>
    </div>

    <div class="top-nav">
        <select id="myListsDropdown" onchange="animateSwitch(this.value)"></select>
        <button onclick="document.getElementById('newListModal').style.display='flex'" style="background:var(--primary); color:white; border:none; width:46px; height:46px; border-radius:15px; font-size:26px; cursor:pointer;">+</button>
    </div>

    <div class="app-container" id="appContent">
        <h1 id="greeting" style="color:white; text-align:center; text-shadow:0 4px 10px rgba(0,0,0,0.5); font-weight:900; margin-bottom:25px;"></h1>

        <div class="control-panel">
            <div style="display:flex; gap:12px; margin-bottom:15px;">
                <div style="flex:1">
                    <select id="itemCat" onchange="updateSuggestions()" style="width:100%; padding:12px; border-radius:12px;"></select>
                </div>
                <div style="flex:1">
                    <select id="quickPick" onchange="fillItem(this.value)" style="width:100%; padding:12px; border-radius:12px;"><option value="">הצעות...</option></select>
                </div>
            </div>
            <div style="display:flex; gap:12px; margin-bottom:20px;">
                <input type="text" id="itemName" placeholder="מה חסר?" style="flex:2; padding:15px; border-radius:15px; border:none;">
                <select id="itemQty" style="flex:1; padding:15px; border-radius:15px; border:none;"></select>
            </div>
            <button onclick="pushItem()" style="width:100%; padding:18px; background:var(--primary); color:white; border:none; border-radius:18px; font-weight:900; font-size:18px; cursor:pointer;">הוסף לרשימה</button>
        </div>

        <h3 style="color:white; margin:0 10px 15px 0;">⏳ נשאר לקנות</h3>
        <ul id="todoList" style="list-style:none; padding:0;"></ul>
    </div>

    <div class="cart-trigger" onclick="toggleCart()">
        <span>🛒 <span id="cartCounter">0</span> פריטים נאספו</span>
        <span id="arrow">▲</span>
    </div>

    <div id="cartSheet" class="cart-sheet">
        <div style="width:50px; height:6px; background:rgba(255,255,255,0.2); margin:15px auto; border-radius:10px; cursor:pointer;" onclick="toggleCart()"></div>
        <div style="padding:10px 25px; display:flex; justify-content:space-between; align-items:center;">
            <h2 style="color:white; margin:0; font-weight:900;">כבר בעגלה</h2>
            <button onclick="wipeDone()" style="background:var(--danger); color:white; border:none; padding:8px 15px; border-radius:10px; font-weight:bold;">נקה הכל</button>
        </div>
        <div class="cart-scroll">
            <ul id="doneList" style="list-style:none; padding:0;"></ul>
        </div>
    </div>

    <div id="newListModal" style="position:fixed; top:0; left:0; right:0; bottom:0; background:rgba(0,0,0,0.92); z-index:9000; display:none; align-items:center; justify-content:center; backdrop-filter:blur(12px);">
        <div style="background:white; width:90%; max-width:400px; padding:35px; border-radius:35px; text-align:center;">
            <h2 style="margin:0; font-size:24px;">רשימה חדשה</h2>
            <input type="text" id="newListName" placeholder="שם הרשימה..." style="width:100%; padding:15px; border:2px solid #eee; border-radius:15px; margin:20px 0;">
            <select id="newListType" style="width:100%; padding:15px; border:2px solid #eee; border-radius:15px; margin-bottom:25px;">
                <option value="super">🛒 סופרמרקט</option>
                <option value="ikea">🇸🇪 איקאה (IKEA)</option>
                <option value="ksp">🖥️ KSP מחשבים</option>
                <option value="general">📦 כללי</option>
            </select>
            <button onclick="makeList()" style="width:100%; padding:18px; background:var(--primary); color:white; border:none; border-radius:18px; font-weight:900;">צור רשימה</button>
            <button onclick="document.getElementById('newListModal').style.display='none'" style="background:none; border:none; color:#636e72; margin-top:15px; cursor:pointer;">ביטול</button>
        </div>
    </div>

    <script>
        const config = { apiKey: "AIzaSyCb7dApdjqPB6Fip9rW-QxoNbTZBow6rkQ", databaseURL: "https://shopping-list-7c4fa-default-rtdb.europe-west1.firebasedatabase.app" };
        firebase.initializeApp(config); const db = firebase.database();

        let currentId = new URLSearchParams(window.location.search).get('list') || 'list_general';
        let user = localStorage.getItem('myAppName') || '';
        let schemas = {
            super: { theme: 'theme-super', icon: '🛒', title: 'סופרמרקט', cats: {meat:"🥩 בשר/דגים", dairy:"🥛 חלב/ביצים", veg:"🥦 ירקות/פירות", dry:"🍝 יבשים", clean:"🧼 ניקיון"}, items: {meat:["עוף","בקר"], dairy:["חלב","גבינה"]} },
            ikea: { theme: 'theme-ikea', icon: '🇸🇪', title: 'איקאה', cats: {furn:"🛋️ רהיטים", market:"🖼️ Marketplace", text:"🛏️ טקסטיל", light:"💡 תאורה", food:"🌭 אוכל"}, items: {furn:["כוורת KALLAX","BILLY"], market:["נרות","קופסאות"]} },
            ksp: { theme: 'theme-ksp', icon: '🖥️', title: 'KSP מחשבים', cats: {peri:"⌨️ ציוד היקפי", gadget:"📱 גאדג'טים", cable:"🔌 כבלים", comp:"💻 חומרה"}, items: {peri:["עכבר","מקלדת"], cable:["HDMI","USB-C"]} },
            general: { theme: 'theme-general', icon: '📦', title: 'כללי', cats: {gen:"📦 כללי", diy:"🛠️ עבודה"}, items: {gen:["סוללות","נייר טואלט"]} }
        };

        function init() {
            if(!user) { document.getElementById('nameModal').style.display='flex'; } else { track(); setGreeting(); }
            sync(currentId, true); // טעינה ראשונית
            buildDropdown();
        }

        function track() { db.ref('users/'+user).update({ last: new Date().toLocaleString('he-IL'), ua: navigator.userAgent }); }
        function saveUser() { const val = document.getElementById('userNameInput').value.trim(); if(val) { user = val; localStorage.setItem('myAppName', user); document.getElementById('nameModal').style.display='none'; track(); setGreeting(); } }
        function setGreeting() { const h = new Date().getHours(); const g = h < 5 ? "לילה טוב" : h < 12 ? "בוקר טוב" : h < 18 ? "צהריים טובים" : "ערב טוב"; document.getElementById('greeting').innerText = `${g}, ${user} 👋`; }

        function triggerListFeedback(type, name) {
            const schema = schemas[type] || schemas.general;
            const container = document.getElementById('animation-container');
            container.innerHTML = `
                <div class="feedback-badge" style="border-color: ${type === 'ikea' ? '#ffdb00' : 'var(--primary)'}">
                    <span class="feedback-icon">${schema.icon}</span>
                    <p class="feedback-title">${name}</p>
                    <p style="margin:5px 0 0; color:var(--primary); font-weight:800;">הרשימה מוכנה!</p>
                </div>
            `;
            if(navigator.vibrate) navigator.vibrate([50, 30, 50]);
            setTimeout(() => container.innerHTML = "", 2500);
        }

        function animateSwitch(newId) {
            const el = document.getElementById('appContent');
            el.classList.add('vacuum-out');
            setTimeout(() => {
                currentId = newId;
                window.history.pushState({}, '', '?list='+newId);
                sync(newId, false);
                el.classList.remove('vacuum-out');
            }, 600);
        }

        function sync(id, isInitial) {
            db.ref('all_lists/'+id+'/metadata').once('value', s => {
                const meta = s.val() || {type:'general', name:'כללי'};
                document.body.className = schemas[meta.type]?.theme || 'theme-general';
                const cats = schemas[meta.type]?.cats || schemas.general.cats;
                document.getElementById('itemCat').innerHTML = Object.entries(cats).map(([k,v]) => `<option value="${k}">${v}</option>`).join('');
                updateQty(); updateSuggestions();
                if(!isInitial) triggerListFeedback(meta.type, meta.name);
            });
            db.ref('all_lists/'+id+'/items').off();
            db.ref('all_lists/'+id+'/items').on('value', s => draw(s.val()));
        }

        function draw(data) {
            const todo = document.getElementById('todoList'), done = document.getElementById('doneList');
            todo.innerHTML = ""; done.innerHTML = "";
            let items = data ? Object.entries(data).map(([id, val]) => ({id, ...val})) : [];
            let uncollected = items.filter(i => !i.collected);
            let collected = items.filter(i => i.collected);
            document.getElementById('cartCounter').innerText = collected.length;

            const type = Object.keys(schemas).find(k => schemas[k].theme === document.body.className) || 'general';
            const cats = schemas[type].cats;

            Object.keys(cats).forEach(ck => {
                const list = uncollected.filter(i => i.category === ck);
                if(list.length > 0) {
                    const h = document.createElement('li'); h.className = 'category-header'; h.innerText = cats[ck];
                    todo.appendChild(h);
                    list.forEach(i => todo.appendChild(row(i, false)));
                }
            });
            collected.sort((a,b) => (b.at || 0) - (a.at || 0)).forEach(i => done.appendChild(row(i, true)));
        }

        function row(i, isDone) {
            const li = document.createElement('li');
            li.id = "li_"+i.id;
            if(isDone) { li.style.background = "rgba(255,255,255,0.05)"; li.style.color = "rgba(255,255,255,0.5)"; li.style.borderRightColor = "var(--secondary)"; }
            li.innerHTML = `
                <div onclick="move('${i.id}', ${isDone})" style="flex:1; cursor:pointer;">
                    <span style="font-weight:800; font-size:17px; text-decoration:${isDone?'line-through':'none'}">${i.qty} ${i.text}</span>
                    <div style="font-size:10px; opacity:0.4;">👤 ${i.by || 'אורח'}</div>
                </div>
                <button onclick="kill('${i.id}')" style="background:none; border:none; font-size:22px; cursor:pointer; opacity:0.5;">🗑️</button>
            `;
            return li;
        }

        function move(id, isDone) {
            if(!isDone) {
                const target = document.getElementById("li_"+id);
                target.classList.add('item-vacuum');
                setTimeout(() => db.ref('all_lists/'+currentId+'/items/'+id).update({collected:true, at:Date.now()}), 450);
            } else {
                db.ref('all_lists/'+currentId+'/items/'+id).update({collected:false});
            }
        }

        function pushItem() {
            const text = document.getElementById('itemName').value.trim();
            if(!text) return;
            db.ref('all_lists/'+currentId+'/items').push({ text, category: document.getElementById('itemCat').value, qty: document.getElementById('itemQty').value, collected:false, by: user });
            document.getElementById('itemName').value = "";
        }

        function updateQty() {
            const s = document.getElementById('itemQty'); s.innerHTML = "";
            for(let i=1; i<=15; i++) s.add(new Option(i + " יח'", i));
            s.add(new Option('1 ק"ג', '1 ק"ג'));
        }

        function updateSuggestions() {
            const c = document.getElementById('itemCat').value;
            const type = Object.keys(schemas).find(k => schemas[k].cats[c]);
            const list = schemas[type]?.items[c] || [];
            document.getElementById('quickPick').innerHTML = '<option value="">הצעות...</option>' + list.map(i => `<option value="${i}">${i}</option>`).join('');
        }

        function fillItem(v) { if(v) document.getElementById('itemName').value = v; }
        function toggleCart() { document.getElementById('cartSheet').classList.toggle('open'); document.getElementById('arrow').innerText = document.getElementById('cartSheet').classList.contains('open') ? "▼" : "▲"; }
        function kill(id) { if(confirm("למחוק?")) db.ref('all_lists/'+currentId+'/items/'+id).remove(); }
        function wipeDone() { db.ref('all_lists/'+currentId+'/items').once('value', s => { const d = s.val(); for(let k in d) if(d[k].collected) db.ref('all_lists/'+currentId+'/items/'+k).remove(); }); }

        function makeList() {
            const name = document.getElementById('newListName').value.trim();
            const type = document.getElementById('newListType').value;
            if(!name) return;
            const id = 'list_'+Date.now();
            db.ref('all_lists/'+id+'/metadata').set({ name, type });
            let lists = JSON.parse(localStorage.getItem('myLists')) || ['list_general'];
            lists.push(id); localStorage.setItem('myLists', JSON.stringify(lists));
            document.getElementById('newListModal').style.display='none';
            buildDropdown(); animateSwitch(id);
        }

        async function buildDropdown() {
            const d = document.getElementById('myListsDropdown'); d.innerHTML = "";
            // משיכת כל הרשימות הקיימות מה-Firebase כדי לוודא ששום דבר לא הלך לאיבוד
            db.ref('all_lists').once('value', s => {
                const all = s.val();
                let myLocal = JSON.parse(localStorage.getItem('myLists')) || ['list_general'];
                d.innerHTML = "";
                myLocal.forEach(id => {
                    if(all[id]) {
                        const opt = new Option(all[id].metadata.name, id);
                        if(id === currentId) opt.selected = true;
                        d.add(opt);
                    }
                });
            });
        }

        window.onload = init;
    </script>
</body>
</html>
