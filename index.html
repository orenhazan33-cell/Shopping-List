<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>רשימת הקניות שלי</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
    
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #f0f2f5; display: flex; justify-content: center; padding: 20px; margin: 0; }
        .app-container { background: white; padding: 30px; border-radius: 15px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); width: 100%; max-width: 450px; text-align: center; }
        h1 { color: #1a73e8; margin-bottom: 25px; }
        .input-group { display: flex; gap: 10px; margin-bottom: 20px; }
        input { flex: 1; padding: 12px; border: 2px solid #ddd; border-radius: 8px; font-size: 16px; outline: none; }
        input:focus { border-color: #1a73e8; }
        button#addBtn { padding: 12px 20px; background-color: #28a745; color: white; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; }
        ul { list-style: none; padding: 0; }
        li { background: #fff; border-bottom: 1px solid #eee; padding: 15px; display: flex; justify-content: space-between; align-items: center; transition: background 0.2s; }
        li:hover { background: #f8f9fa; }
        .delete-btn { color: #dc3545; cursor: pointer; font-size: 18px; padding: 5px 10px; }
        .clear-btn { background-color: #dc3545; color: white; border: none; padding: 12px; border-radius: 8px; width: 100%; margin-top: 20px; cursor: pointer; font-weight: bold; }
    </style>
</head>
<body>

    <div class="app-container">
        <h1>🛒 הקניות שלי</h1>
        
        <div class="input-group">
            <input type="text" id="itemInput" placeholder="מה להוסיף לסל?">
            <button id="addBtn" onclick="addItem()">הוסף</button>
        </div>

        <ul id="shoppingList"></ul>

        <button class="clear-btn" onclick="clearAll()">מחק את כל הרשימה</button>
    </div>

    <script>
        // --- הגדרות Firebase המדויקות שלך (מתוך image_d349fe) ---
        const firebaseConfig = {
            apiKey: "AIzaSyCb7dApdjqPB6Fip9rW-QxoNbTZBow6rkQ",
            authDomain: "shopping-list-7c4fa.firebaseapp.com",
            databaseURL: "https://shopping-list-7c4fa-default-rtdb.europe-west1.firebasedatabase.app",
            projectId: "shopping-list-7c4fa",
            storageBucket: "shopping-list-7c4fa.appspot.com",
            messagingSenderId: "482760938255",
            appId: "1:482760938255:web:99e0dd53cb822a8327e47a",
            measurementId: "G-MBRDXXLKKX"
        };

        // אתחול
        firebase.initializeApp(firebaseConfig);
        const database = firebase.database();
        const listRef = database.ref('items');

        // הוספת פריט
        function addItem() {
            const input = document.getElementById('itemInput');
            const val = input.value.trim();
            if (val === "") return;
            
            listRef.push({
                text: val
            });
            input.value = ""; 
        }

        // הצגת פריטים בזמן אמת
        listRef.on('value', (snapshot) => {
            const listElement = document.getElementById('shoppingList');
            listElement.innerHTML = ""; 
            const data = snapshot.val();
            for (let id in data) {
                const li = document.createElement('li');
                li.innerHTML = `
                    <span>${data[id].text}</span>
                    <span class="delete-btn" onclick="deleteItem('${id}')">❌</span>
                `;
                listElement.appendChild(li);
            }
        });

        // מחיקת פריט
        function deleteItem(id) {
            if(confirm("למחוק את הפריט?")) {
                database.ref('items/' + id).remove();
            }
        }

        // ניקוי כל הרשימה
        function clearAll() {
            if (confirm("בטוח שרוצה למחוק את כל הרשימה?")) {
                listRef.remove();
            }
        }
    </script>
</body>
</html>
