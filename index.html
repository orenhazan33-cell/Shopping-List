<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>הקניות של אורן - גרסה מלאה</title>
    <link rel="manifest" href="./manifest.json">
    <meta name="theme-color" content="#4a90e2">
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
    <style>
        :root { --primary: #4a90e2; --secondary: #2ecc71; --danger: #e74c3c; }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { font-family: 'Segoe UI', system-ui, sans-serif; margin: 0; padding-bottom: 110px; background: #f4f7f9; direction: rtl; text-align: right; }
        .top-nav { background: white; padding: 12px; display: flex; gap: 10px; box-shadow: 0 2px 8px rgba(0,0,0,0.1); position: sticky; top: 0; z-index: 1000; }
        .app-container { width: 95%; max-width: 500px; margin: 15px auto; }
        .control-panel { background: white; border-radius: 20px; padding: 18px; box-shadow: 0 8px 25px rgba(0,0,0,0.05); border-top: 6px solid var(--primary); }
        .input-group { display: flex; flex-direction: column; gap: 12px; }
        .row { display: flex; gap: 8px; align-items: center; }
        select, input { padding: 12px; border: 2px solid #f0f0f0; border-radius: 12px; font-size: 16px; outline: none; flex: 1; text-align: right; }
        .btn { padding: 12px; border: none; border-radius: 12px; cursor: pointer; font-weight: bold; }
        .btn-add { background: var(--primary); color: white; flex: 2; }
        ul { list-style: none; padding: 0; margin: 20px 0 0 0; }
        li { 
            background: white; margin-bottom: 10px; padding: 16px; border-radius: 15px; 
            display: flex; align-items: center; justify-content: flex-start; gap: 12px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.03); border-right: 6px solid var(--primary);
        }
        .collected { opacity: 0.4; text-decoration: line-through; filter: grayscale(1); background: #f8f8f8 !important; }
        .budget-bar { position: fixed; bottom: 0; left: 0; right: 0; background: #2c3e50; color: white; padding: 18px; display: flex; justify-content: space-around; font-weight: bold; z-index: 1001; }
    </style>
</head>
<body>
    <div class="top-nav">
        <select id="myListsDropdown" onchange="switchList(this.value)" style="flex:1;"></select>
        <button class="btn" style="background: var(--secondary); color: white;" onclick="showNewList()">+</button>
    </div>
    <div class="app-container">
        <div class="control-panel">
            <input type="text" id="listNameInput" style="font-size:20px; font-weight:bold; border:none; width:100%; margin-bottom:10px; text-align:right;" onblur="saveListName(this.value)">
            <div class="input-group">
                <div class="row">
                    <select id="itemCat" onchange="updateUI()"></select>
                    <select id="quickSelect" onchange="useQuick(this.value)" style="max-width: 90px; font-size: 13px; color: #666;">
                        <option value="">הצג</option>
                    </select>
                </div>
                <div class="row">
                    <input type="text" id="itemInput" placeholder="מה לקנות?" oninput="checkPrice(this.value)" autocomplete="off">
                    <input type="number" id="itemPrice" placeholder="₪ מחיר" style="max-width: 70px;">
                </div>
                <div class="row">
                    <input type="number" id="itemQty" value="1" style="max-width: 65px;">
                    <button class="btn btn-add" onclick="addItem()">הוסף לרשימה</button>
                </div>
            </div>
        </div>
        <ul id="shoppingList"></ul>
        <ul id="collectedList"></ul>
    </div>
    <div class="budget-bar">
        <div>צפי: <span id="sumP">0</span> ₪</div>
        <div>בסל: <span id="sumC">0</span> ₪</div>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyCb7dApdjqPB6Fip9rW-QxoNbTZBow6rkQ",
            authDomain: "shopping-list-7c4fa.firebaseapp.com",
            databaseURL: "https://shopping-list-7c4fa-default-rtdb.europe-west1.firebasedatabase.app",
            projectId: "shopping-list-7c4fa",
            storageBucket: "shopping-list-7c4fa.firebasestorage.app",
            messagingSenderId: "482760938255",
            appId: "1:482760938255:web:99e0dd53cb822a8327e47a"
        };
        firebase.initializeApp(firebaseConfig);
        const database = firebase.database();
        let currentListId = new URLSearchParams(window.location.search).get('list') || (JSON.parse(localStorage.getItem('myLists')) || ['list_general'])[0];

        if ('serviceWorker' in navigator) { window.addEventListener('load', () => navigator.serviceWorker.register('./sw.js')); }

        const prices = { "חלב": 6.5, "ביצים": 13, "לחם": 8, "עוף": 35, "עגבניה": 6, "מלפפון": 5, "קוטג": 6, "גבינה": 14 };
        const cats = { 
            super: {meat:"🥩 בשר", dairy:"🥛 חלב", veg:"🥦 ירקות", gen:"📦 כללי"}, 
            birthday: {party:"🎈 מסיבה", sweet:"🍰 מתוקים", drinks:"🥤 שתייה"} 
        };
        const quickItems = {
            meat: ["עוף", "בשר טחון", "שניצל", "סטייק"],
            dairy: ["חלב", "גבינה צהובה", "קוטג'", "חמאה"],
            veg: ["עגבניה", "מלפפון", "בצל", "תפוח אדמה"],
            gen: ["שמן", "סוכר", "קפה", "אורז"],
            party: ["בלונים", "מפות", "נרות"],
            sweet: ["עוגה", "חטיפים", "ממתקים"],
            drinks: ["קולה", "מיץ", "מים"]
        };

        function checkPrice(v) { for (let k in prices) { if (v.includes(k)) { document.getElementById('itemPrice').value = prices[k]; return; } } }
        function useQuick(v) { if(v) { document.getElementById('itemInput').value = v; checkPrice(v); } }
        
        function init() {
            database.ref('all_lists/'+currentListId+'/metadata').on('value', s => {
                const meta = s.val() || { name: "רשימה כללית", type: "super" };
                document.getElementById('listNameInput').value = meta.name;
                const sel = document.getElementById('itemCat');
                sel.innerHTML = Object.entries(cats[meta.type] || cats.super).map(([k,v]) => `<option value="${k}">${v}</option>`).join('');
                updateUI();
            });
            database.ref('all_lists/'+currentListId+'/items').on('value', s => render(s.val()));
            updateDrop();
        }

        function updateUI() {
            const cat = document.getElementById('itemCat').value;
            const qs = document.getElementById('quickSelect');
            const items = quickItems[cat] || [];
            qs.innerHTML = '<option value="">הצג</option>' + items.map(i => `<option value="${i}">${i}</option>`).join('');
        }

        function render(data) {
            const todo = document.getElementById('shoppingList'), done = document.getElementById('collectedList');
            todo.innerHTML = ""; done.innerHTML = "";
            let p = 0, c = 0;
            for (let id in data) {
                const item = data[id];
                const total = (item.price || 0) * (item.qty || 1);
                p += total; if(item.collected) c += total;
                const li = document.createElement('li');
                li.className = item.collected ? 'collected' : '';
                li.innerHTML = `<div onclick="toggle('${id}', ${item.collected})" style="flex:1"><b>${item.qty}</b> | ${item.text} ${total > 0 ? `<span style="color:#2ecc71; font-weight:bold;">(${total}₪)</span>` : ''}</div><span onclick="del('${id}')" style="cursor:pointer">🗑️</span>`;
                (item.collected ? done : todo).appendChild(li);
            }
            document.getElementById('sumP').innerText = p.toFixed(1);
            document.getElementById('sumC').innerText = c.toFixed(1);
        }

        function addItem() {
            const text = document.getElementById('itemInput').value.trim();
            if(!text) return;
            database.ref('all_lists/'+currentListId+'/items').push({
                text, price: parseFloat(document.getElementById('itemPrice').value) || 0,
                qty: document.getElementById('itemQty').value, category: document.getElementById('itemCat').value, collected: false
            });
            document.getElementById('itemInput').value = ""; document.getElementById('itemPrice').value = "";
        }

        function toggle(id, s) { database.ref('all_lists/'+currentListId+'/items/'+id).update({collected: !s}); }
        function del(id) { if(confirm("למחוק?")) database.ref('all_lists/'+currentListId+'/items/'+id).remove(); }
        function saveListName(n) { database.ref('all_lists/'+currentListId+'/metadata/name').set(n); }
        function switchList(id) { window.location.search = '?list=' + id; }
        function showNewList() {
            const n = prompt("שם הרשימה:"), t = prompt("סוג (super/birthday):", "super");
            if(!n) return; const id = 'list_'+Date.now();
            database.ref('all_lists/'+id+'/metadata').set({name:n, type:t || "super"});
            let l = JSON.parse(localStorage.getItem('myLists')) || []; l.push(id);
            localStorage.setItem('myLists', JSON.stringify(l)); switchList(id);
        }
        async function updateDrop() {
            const d = document.getElementById('myListsDropdown');
            let l = JSON.parse(localStorage.getItem('myLists')) || []; d.innerHTML = "";
            for (const id of l) {
                const s = await database.ref('all_lists/'+id+'/metadata/name').once('value');
                const o = document.createElement('option'); o.value = id; o.text = s.val() || "רשימה";
                if(id === currentListId) o.selected = true; d.add(o);
            }
        }
        init();
    </script>
</body>
</html>
