<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>הקניות של אורן - Ultimate FX</title>
    <link rel="manifest" href="./manifest.json">
    <meta name="theme-color" content="#1e272e">
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
    <style>
        :root {
            --primary: #0984e3; --secondary: #00b894; --danger: #ff4757; --share: #6c5ce7;
            --glass: rgba(255, 255, 255, 0.95);
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

        body { 
            font-family: 'Segoe UI', system-ui, sans-serif; 
            margin: 0; padding-bottom: 140px; min-height: 100vh;
            background-color: #1e272e; background-attachment: fixed; background-size: cover; background-position: center;
            transition: background-image 0.6s ease-in-out; direction: rtl; text-align: right; overflow-x: hidden;
        }

        /* רקעים כהים ומדויקים יותר לקריאות מושלמת */
        body.theme-super { background-image: linear-gradient(rgba(15,20,25,0.7), rgba(15,20,25,0.85)), url('https://images.unsplash.com/photo-1542838132-92c53300491e?auto=format&fit=crop&w=1080&q=80'); }
        body.theme-birthday { background-image: linear-gradient(rgba(20,10,20,0.65), rgba(20,10,20,0.8)), url('https://images.unsplash.com/photo-1530103862676-de8892bf309c?auto=format&fit=crop&w=1080&q=80'); }
        body.theme-wedding { background-image: linear-gradient(rgba(30,20,10,0.7), rgba(30,20,10,0.85)), url('https://images.unsplash.com/photo-1519225421980-715cb0215aed?auto=format&fit=crop&w=1080&q=80'); }
        body.theme-bar { background-image: linear-gradient(rgba(10,20,40,0.75), rgba(10,20,40,0.9)), url('https://images.unsplash.com/photo-1601564264639-661cd8c1e843?auto=format&fit=crop&w=1080&q=80'); }

        .modal-overlay { position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.85); z-index: 3000; display: none; align-items: center; justify-content: center; backdrop-filter: blur(12px); }
        .app-modal { background: white; width: 90%; max-width: 440px; border-radius: 30px; padding: 35px; text-align: center; box-shadow: 0 30px 60px rgba(0,0,0,0.5); }

        .top-nav { background: rgba(255,255,255,0.95); backdrop-filter: blur(15px); padding: 15px; display: flex; gap: 12px; position: sticky; top: 0; z-index: 1000; box-shadow: 0 4px 20px rgba(0,0,0,0.15); align-items: center; border-bottom: 3px solid var(--primary); }
        .app-container { width: 94%; max-width: 500px; margin: 25px auto; }
        .control-panel { background: var(--glass); border-radius: 30px; padding: 25px; box-shadow: 0 20px 40px rgba(0,0,0,0.3); }
        .section-label { font-size: 13px; font-weight: 800; color: #636e72; margin-bottom: 6px; display: block; padding-right: 5px; }

        input, select { padding: 15px; border: 2px solid #dfe6e9; border-radius: 18px; font-size: 16px; outline: none; background: #fff; width: 100%; transition: 0.3s; color: #2d3436; font-weight: 600; }
        input:focus, select:focus { border-color: var(--primary); box-shadow: 0 0 10px rgba(9,132,227,0.15); }
        
        .btn { padding: 16px; border: none; border-radius: 18px; cursor: pointer; font-weight: 900; font-size: 17px; display: flex; align-items: center; justify-content: center; gap: 10px; transition: 0.2s; box-shadow: 0 8px 20px rgba(0,0,0,0.1); }
        .btn:active { transform: scale(0.96); }
        .btn-add { background: var(--primary); color: white; width: 100%; }
        .btn-share { background: var(--share); color: white; width: 100%; margin-top: 10px; }
        .btn-danger { background: var(--danger); color: white; padding: 12px 20px; border-radius: 15px; font-size: 14px; box-shadow: none; }

        ul { list-style: none; padding: 0; margin: 30px 0; }
        li { background: var(--glass); margin-bottom: 12px; padding: 20px; border-radius: 20px; display: flex; align-items: center; justify-content: space-between; box-shadow: 0 10px 20px rgba(0,0,0,0.1); border-right: 8px solid var(--primary); transition: 0.3s; }
        .collected { opacity: 0.5; filter: grayscale(1); transform: scale(0.98); border-right-color: #b2bec3; }

        .budget-bar { position: fixed; bottom: 0; left: 0; right: 0; background: rgba(20, 25, 30, 0.98); backdrop-filter: blur(15px); color: white; padding: 20px; display: flex; justify-content: space-around; z-index: 1001; border-radius: 35px 35px 0 0; box-shadow: 0 -10px 30px rgba(0,0,0,0.6); border-top: 1px solid rgba(255,255,255,0.1); }
        .suggestions-box { position: absolute; background: white; width: 100%; border-radius: 18px; box-shadow: 0 15px 35px rgba(0,0,0,0.2); z-index: 2000; display: none; margin-top: 5px; border: 1px solid #dfe6e9; max-height: 250px; overflow-y: auto; }
        .suggestion-item { padding: 15px; border-bottom: 1px solid #f1f2f6; cursor: pointer; display: flex; justify-content: space-between; font-weight: 700; color: #2d3436; }

        /* --- מנוע אנימציות עוצמתי --- */
        #animation-container { position: fixed; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 5000; overflow: hidden; display: flex; justify-content: center; align-items: center; }
        .graphic-anim { position: absolute; background-size: contain; background-repeat: no-repeat; opacity: 0; }
        
        @keyframes floatUp { 0% { transform: translateY(110vh) scale(0.5); opacity: 1; } 100% { transform: translateY(-20vh) scale(1.5); opacity: 0; } }
        @keyframes fallDown { 0% { transform: translateY(-10vh) rotate(0deg); opacity: 1; } 100% { transform: translateY(110vh) rotate(720deg); opacity: 0; } }
        @keyframes slideAcross { 0% { transform: translateX(120vw); opacity: 1; } 100% { transform: translateX(-120vw); opacity: 1; } }
        @keyframes popGlow { 0% { transform: scale(0); opacity: 0; } 50% { transform: scale(1.2); opacity: 1; filter: drop-shadow(0 0 30px gold); } 100% { transform: scale(1.5); opacity: 0; } }
        
        /* עיצוב טקסט קופץ בולט במיוחד (Pill) */
        @keyframes textPop { 0% { transform: scale(0.5); opacity: 0; } 15% { transform: scale(1.1); opacity: 1; } 80% { transform: scale(1); opacity: 1; } 100% { transform: scale(1.15); opacity: 0; } }
        .anim-text {
            font-size: 32px; font-weight: 900; color: #fff;
            background: rgba(0, 0, 0, 0.75); border: 2px solid rgba(255,255,255,0.2); /* רקע כהה להבלטה מושלמת */
            padding: 20px 40px; border-radius: 50px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.6);
            animation: textPop 4s ease-in-out forwards;
            text-align: center; z-index: 5001;
        }
    </style>
</head>
<body class="theme-super">

    <div id="animation-container"></div>

    <div id="deleteModal" class="modal-overlay">
        <div class="app-modal">
            <h2 style="color: var(--danger); margin-top:0;">מחיקת רשימה</h2>
            <p style="font-size:16px; color:#2d3436;">האם אתה בטוח שברצונך למחוק את הרשימה לתמיד?</p>
            <div style="display:flex; gap:10px; margin-top:20px;">
                <button class="btn btn-danger" style="flex:2" onclick="confirmDeleteList()">כן, מחק</button>
                <button class="btn" style="flex:1; background:#dfe6e9; color:#2d3436;" onclick="closeModal('deleteModal')">ביטול</button>
            </div>
        </div>
    </div>

    <div id="newListModal" class="modal-overlay">
        <div class="app-modal">
            <h2 style="margin-top:0;">רשימה חדשה</h2>
            <div style="text-align: right;">
                <span class="section-label">שם הרשימה:</span>
                <input type="text" id="newListName" placeholder="למשל: קניות לשבת" style="margin-bottom:15px;">
                <span class="section-label">סוג האירוע:</span>
                <select id="newListType" style="margin-bottom:25px;">
                    <option value="super">🛒 קניות בסופר</option>
                    <option value="bar">✡️ אירוע בר מצווה</option>
                    <option value="wedding">👰 חתונה</option>
                    <option value="birthday">🎈 מסיבת יום הולדת</option>
                </select>
            </div>
            <div style="display:flex; gap:10px;">
                <button class="btn btn-add" style="flex:2" onclick="createNewList()">צור רשימה</button>
                <button class="btn" style="flex:1; background:#dfe6e9; color:#2d3436;" onclick="closeModal('newListModal')">ביטול</button>
            </div>
        </div>
    </div>

    <div class="top-nav">
        <select id="myListsDropdown" onchange="switchList(this.value)" style="flex:1; font-weight:900; border:none; background:none; font-size: 18px; color: #2d3436; margin: 0; padding: 5px; box-shadow: none;"></select>
        <button class="btn btn-add" style="padding:0 25px; margin:0; width: auto; font-size: 22px; height: 45px;" onclick="document.getElementById('newListModal').style.display='flex'">+</button>
    </div>

    <div class="app-container">
        <div class="control-panel">
            <div style="display:flex; justify-content:space-between; align-items:flex-start; margin-bottom:20px; border-bottom: 2px solid #f1f2f6; padding-bottom: 15px;">
                <div style="flex:1;">
                    <span class="section-label">שם הרשימה (ניתן לעריכה)</span>
                    <input type="text" id="listNameInput" style="font-size:22px; font-weight:900; border:none; outline:none; background:none; color:#2d3436; padding:0; box-shadow: none;" onblur="saveListName(this.value)">
                </div>
                <button class="btn-danger" title="מחק רשימה" onclick="document.getElementById('deleteModal').style.display='flex'">מחק רשימה</button>
            </div>
            
            <div style="display:flex; flex-direction:column; gap:15px;">
                <div style="display:flex; gap:10px;">
                    <div style="flex:2">
                        <span class="section-label">קטגוריה</span>
                        <select id="itemCat" onchange="updateQuantityOptions(); updateQuickSelect();"></select>
                    </div>
                    <div style="flex:1">
                        <span class="section-label">הצעה מהירה</span>
                        <select id="quickSelect" onchange="useQuick(this.value)"><option value="">בחר...</option></select>
                    </div>
                </div>
                
                <div>
                    <span class="section-label">שם המוצר</span>
                    <div style="position: relative;">
                        <input type="text" id="itemInput" placeholder="מה תרצה לקנות?" oninput="handleAuto(this.value)" autocomplete="off">
                        <div id="suggestions" class="suggestions-box"></div>
                    </div>
                </div>
                
                <div style="display:flex; gap:10px;">
                    <div style="flex:1;">
                        <span class="section-label">מחיר לפריט (₪)</span>
                        <input type="number" id="itemPrice" placeholder="0" style="text-align:center;">
                    </div>
                    <div style="flex:1;">
                        <span class="section-label">כמות / משקל</span>
                        <select id="itemQty" style="text-align:center; direction: ltr;"></select>
                    </div>
                </div>
                
                <button class="btn btn-add" onclick="addItem()">הוסף לרשימה</button>
                <button class="btn btn-share" onclick="handleShareAction()">📤 שלח לחברים / משפחה</button>
            </div>
        </div>

        <h3 style="margin: 35px 10px 10px; font-weight: 900; color: #fff; text-shadow: 0 2px 8px rgba(0,0,0,0.8);">⏳ צריך לקנות</h3>
        <ul id="shoppingList"></ul>
        
        <h3 style="margin: 35px 10px 10px; font-weight: 900; color: #dfe6e9; text-shadow: 0 2px 8px rgba(0,0,0,0.8);">✅ כבר בעגלה</h3>
        <ul id="collectedList"></ul>
    </div>

    <div class="budget-bar">
        <div style="text-align:center; flex:1; border-left: 1px solid rgba(255,255,255,0.1);">צפי הוצאה<br><span id="sumP" style="font-size:24px; color:#74b9ff; font-weight:900;">0</span></div>
        <div style="text-align:center; flex:1;">בסל כרגע<br><span id="sumC" style="font-size:24px; color:#55efc4; font-weight:900;">0</span></div>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyCb7dApdjqPB6Fip9rW-QxoNbTZBow6rkQ",
            authDomain: "shopping-list-7c4fa.firebaseapp.com",
            databaseURL: "https://shopping-list-7c4fa-default-rtdb.europe-west1.firebasedatabase.app",
            projectId: "shopping-list-7c4fa",
            storageBucket: "shopping-list-7c4fa.firebasestorage.app",
            messagingSenderId: "482760938255",
            appId: "1:482760938255:web:99e0dd53cb822a8327e47a"
        };
        firebase.initializeApp(firebaseConfig);
        const database = firebase.database();
        
        let currentListId = new URLSearchParams(window.location.search).get('list') || (JSON.parse(localStorage.getItem('myLists')) || ['list_general'])[0];
        let currentType = "super", learnedPrices = {};

        // מאגר מוצרים מורחב מאוד למניעת חוסרים
        const templates = {
            super: { 
                theme: 'theme-super', title: 'סופר', 
                cats: {meat:"🥩 בשר ודגים", dairy:"🥛 חלב וביצים", veg:"🥦 ירקות ופירות", dry:"🍝 יבשים ושימורים", clean:"🧼 ניקיון ופארם"}, 
                items: {meat:["עוף שלם", "חזה עוף", "בקר טחון", "שניצל", "דג סלמון"], dairy:["חלב 3%", "ביצים L", "קוטג'", "גבינה צהובה", "יוגורט", "חמאה"], veg:["עגבניה", "מלפפון", "בצל", "תפוח אדמה", "לימון", "בננה"], dry:["פסטה", "אורז", "שמן זית", "קמח", "רסק עגבניות"], clean:["נייר טואלט", "סבון כלים", "שמפו", "אבקת כביסה"]} 
            },
            birthday: { 
                theme: 'theme-birthday', title: 'יום הולדת', 
                cats: {party:"🎈 ציוד למסיבה", sweet:"🍰 חטיפים ומתוקים", drinks:"🥤 שתייה"}, 
                items: {party:["בלונים", "נרות", "צלחות חד\"פ", "כוסות חד\"פ", "מפיות", "מפת שולחן"], sweet:["עוגת יום הולדת", "במבה", "ביסלי", "תפוצ'יפס", "מרשמלו", "סוכריות"], drinks:["קולה", "מים מינרלים", "מיץ פטל", "ספרייט"]} 
            },
            bar: { 
                theme: 'theme-bar', title: 'בר מצווה', 
                cats: {relig:"✡️ קדושה", log:"🎉 הפקה ואורחים"}, 
                items: {relig:["כיפות", "טלית", "סידור", "תפילין"], log:["הזמנות", "מתנות לאורחים", "סוכריות לזריקה"]} 
            },
            wedding: { 
                theme: 'theme-wedding', title: 'חתונה', 
                cats: {gift:"🎁 מתנות וטבעות", log:"👰 לוגיסטיקה ואירוע"}, 
                items: {gift:["טבעת נישואין", "זר כלה", "מתנה לחתן"], log:["הזמנות לחתונה", "פתקי הושבה", "אלכוהול", "קישוטים לרכב"]} 
            }
        };

        const basePrices = { "חלב 3%": 6.5, "ביצים L": 13, "לחם": 8, "עוף שלם": 35, "קוטג'": 6.5, "נייר טואלט": 35, "קולה": 7, "במבה": 5 };

        function init() {
            loadListData(currentListId, false);
            updateDropdown();
            // משיכת המאגר הלומד
            database.ref('global_dictionary').on('value', s => {
                learnedPrices = s.val() || {};
            });
        }

        // --- מנוע האנימציות המוגבר (Full Screen Takeover) ---
        function triggerAnimation(type) {
            const container = document.getElementById('animation-container');
            container.innerHTML = ''; 
            
            if (navigator.vibrate) navigator.vibrate([50, 100, 50]);

            let msg = "";
            if (type === 'birthday') msg = "מתחילים לחגוג! 🎈";
            else if (type === 'wedding') msg = "מתכוננים ליום הגדול... 💍";
            else if (type === 'super') msg = "אורן, מכינים את העגלה... 🛒";
            else if (type === 'bar') msg = "מזל טוב לחתן! ✡️";
            
            if (msg) {
                const textDiv = document.createElement('div');
                textDiv.className = 'anim-text';
                textDiv.innerText = msg;
                container.appendChild(textDiv);
            }

            if (type === 'birthday') {
                const balloonSvg = "url('data:image/svg+xml;utf8,<svg xmlns=\"http://www.w3.org/2000/svg\" viewBox=\"0 0 24 24\" fill=\"%23ff4757\"><path d=\"M12,2C8.69,2,6,4.69,6,8c0,3.58,4.25,9.36,5.34,10.82C11.66,19.26,12.34,19.26,12.66,18.82C13.75,17.36,18,11.58,18,8 C18,4.69,15.31,2,12,2z\"/><path d=\"M12,20c-0.55,0-1,0.45-1,1v1c0,0.55,0.45,1,1,1s1-0.45,1-1v-1C13,20.45,12.55,20,12,20z\"/></svg>')";
                for (let i = 0; i < 35; i++) { // כמות עצומה של בלונים
                    const b = document.createElement('div');
                    b.className = 'graphic-anim';
                    b.style.backgroundImage = balloonSvg;
                    const size = 50 + Math.random() * 50;
                    b.style.width = size + 'px'; b.style.height = (size * 1.3) + 'px';
                    b.style.left = Math.random() * 100 + 'vw';
                    b.style.animation = `floatUp ${3 + Math.random() * 3}s ease-in forwards`;
                    b.style.filter = `hue-rotate(${Math.random() * 360}deg)`; 
                    container.appendChild(b);
                }
            } else if (type === 'wedding') {
                for (let i = 0; i < 100; i++) { // 100 חתיכות קונפטי על כל המסך
                    const c = document.createElement('div');
                    c.className = 'graphic-anim';
                    c.style.background = Math.random() > 0.5 ? '#d4af37' : '#ffffff';
                    c.style.width = (5 + Math.random() * 10) + 'px'; c.style.height = (10 + Math.random() * 15) + 'px';
                    c.style.left = Math.random() * 100 + 'vw';
                    c.style.animation = `fallDown ${2 + Math.random() * 4}s linear forwards`;
                    container.appendChild(c);
                }
            } else if (type === 'super') {
                const cartSvg = "url('data:image/svg+xml;utf8,<svg xmlns=\"http://www.w3.org/2000/svg\" viewBox=\"0 0 24 24\" fill=\"%23ffffff\"><path d=\"M7 18c-1.1 0-1.99.9-1.99 2S5.9 22 7 22s2-.9 2-2-.9-2-2-2zM1 2v2h2l3.6 7.59-1.35 2.45c-.16.28-.25.61-.25.96 0 1.1.9 2 2 2h12v-2H7.42c-.14 0-.25-.11-.25-.25l.03-.12.9-1.63h7.45c.75 0 1.41-.41 1.75-1.03l3.58-6.49c.08-.14.12-.31.12-.48 0-.55-.45-1-1-1H5.21l-.94-2H1zm16 16c-1.1 0-1.99.9-1.99 2s.89 2 1.99 2 2-.9 2-2-.9-2-2-2z\"/></svg>')";
                const cart = document.createElement('div');
                cart.className = 'graphic-anim';
                cart.style.backgroundImage = cartSvg;
                cart.style.width = '250px'; cart.style.height = '250px'; // עגלה ענקית
                cart.style.top = '50%';
                cart.style.animation = 'slideAcross 3s linear forwards';
                container.appendChild(cart);
            } else if (type === 'bar') {
                const starSvg = "url('data:image/svg+xml;utf8,<svg xmlns=\"http://www.w3.org/2000/svg\" viewBox=\"0 0 24 24\" fill=\"gold\"><path d=\"M12 2L15.09 8.26L22 9.27L17 14.14L18.18 21.02L12 17.77L5.82 21.02L7 14.14L2 9.27L8.91 8.26L12 2Z\"/></svg>')";
                const star = document.createElement('div');
                star.className = 'graphic-anim';
                star.style.backgroundImage = starSvg;
                star.style.width = '200px'; star.style.height = '200px';
                star.style.top = '40%'; star.style.left = '50%';
                star.style.animation = 'popGlow 4s ease-out forwards';
                container.appendChild(star);
            }
            setTimeout(() => { container.innerHTML = ''; }, 5000);
        }

        function updateQuantityOptions() {
            const cat = document.getElementById('itemCat').value;
            const qtySelect = document.getElementById('itemQty');
            qtySelect.innerHTML = ''; 

            if (cat === 'meat' || cat === 'veg' || cat === 'food' || cat === 'dry') {
                for (let i = 200; i <= 4000; i += 100) {
                    let text = i >= 1000 ? (i / 1000) + ' ק"ג' : i + ' גרם';
                    qtySelect.add(new Option(text, i / 1000)); 
                }
            } else {
                for (let i = 1; i <= 20; i++) {
                    qtySelect.add(new Option(i + " יח'", i));
                }
            }
        }

        function loadListData(id, showMascot = true) {
            database.ref('all_lists/'+currentListId+'/metadata').off();
            database.ref('all_lists/'+currentListId+'/items').off();
            currentListId = id;
            database.ref('all_lists/'+id+'/metadata').on('value', s => {
                const meta = s.val() || { name: "רשימה", type: "super" };
                document.getElementById('listNameInput').value = meta.name; 
                currentType = meta.type || "super";
                document.body.className = templates[currentType].theme;
                
                if(showMascot) triggerAnimation(currentType);
                
                document.getElementById('itemCat').innerHTML = Object.entries(templates[currentType].cats).map(([k,v]) => `<option value="${k}">${v}</option>`).join('');
                updateQuantityOptions(); 
                updateQuickSelect();
            });
            database.ref('all_lists/'+id+'/items').on('value', s => render(s.val()));
        }

        function render(data) {
            const todo = document.getElementById('shoppingList'), done = document.getElementById('collectedList');
            todo.innerHTML = ""; done.innerHTML = "";
            let p = 0, c = 0;
            for (let id in data) {
                const item = data[id];
                const numericQty = parseFloat(item.qtyVal) || parseFloat(item.qty) || 1;
                const displayText = item.qtyText || item.qty || '1';
                
                const total = (item.price || 0) * numericQty;
                p += total; if(item.collected) c += total;
                
                const li = document.createElement('li');
                li.className = item.collected ? 'collected' : '';
                li.innerHTML = `
                    <div onclick="toggleStatus('${id}',${item.collected})" style="flex:1; font-weight:800; color:#2d3436; font-size:17px;">
                        <span style="color:var(--primary); font-size:15px; margin-left:5px;">${displayText}</span> 
                        ${item.text} 
                        <span style="color:#2ecc71; margin-right:12px;">${total>0 ? total.toFixed(1)+'₪' : ''}</span>
                    </div>
                    <span onclick="del('${id}')" style="cursor:pointer; font-size:24px; color:#ff4757; opacity:0.8; padding:5px;">🗑️</span>
                `;
                (item.collected ? done : todo).appendChild(li);
            }
            document.getElementById('sumP').innerText = p.toFixed(1);
            document.getElementById('sumC').innerText = c.toFixed(1);
        }

        function handleAuto(v) {
            const box = document.getElementById('suggestions');
            if(v.length < 1) { box.style.display = 'none'; return; }
            const allItems = {...basePrices, ...learnedPrices};
            const filtered = Object.keys(allItems).filter(k => k.includes(v));
            if(filtered.length > 0) {
                box.innerHTML = filtered.map(k => `
                    <div class="suggestion-item" onclick="useQuick('${k}')">
                        <span>${k}</span> 
                        <small style="color:#0984e3">${allItems[k] > 0 ? allItems[k] + '₪' : '+'}</small>
                    </div>
                `).join('');
                box.style.display = 'block';
            } else { box.style.display = 'none'; }
        }

        function useQuick(v) {
            const allItems = {...basePrices, ...learnedPrices};
            document.getElementById('itemInput').value = v;
            document.getElementById('itemPrice').value = allItems[v] || "";
            document.getElementById('suggestions').style.display = 'none';
        }

        // --- הוספה ולימוד אוטומטי למאגר הנתונים ---
        function addItem() {
            const text = document.getElementById('itemInput').value.trim();
            if(!text) return;
            const price = parseFloat(document.getElementById('itemPrice').value) || 0;
            
            const qtySelect = document.getElementById('itemQty');
            const qtyVal = parseFloat(qtySelect.value);
            const qtyText = qtySelect.options[qtySelect.selectedIndex].text;
            const cat = document.getElementById('itemCat').value;
            
            // מוח לומד - שומר את המוצר במאגר. אם אין מחיר, נשמור 0 כדי שנזכור לפחות את השם!
            database.ref('global_dictionary/' + text).set(price);
            
            database.ref('all_lists/'+currentListId+'/items').push({ 
                text: text, price: price, qtyVal: qtyVal, qtyText: qtyText, qty: qtyText, category: cat, collected: false 
            });
            
            if (navigator.vibrate) navigator.vibrate(50); 
            document.getElementById('itemInput').value = ""; document.getElementById('itemPrice').value = "";
            document.getElementById('suggestions').style.display = 'none';
        }

        function createNewList() {
            const name = document.getElementById('newListName').value;
            const type = document.getElementById('newListType').value;
            if(!name) return;
            const id = 'list_' + Date.now();
            database.ref('all_lists/'+id+'/metadata').set({name, type});
            let l = JSON.parse(localStorage.getItem('myLists')) || []; l.push(id);
            localStorage.setItem('myLists', JSON.stringify(l));
            closeModal('newListModal'); updateDropdown(); switchList(id);
        }

        function confirmDeleteList() {
            let lists = JSON.parse(localStorage.getItem('myLists')) || [];
            if (lists.length <= 1) { alert("לא ניתן למחוק את הרשימה האחרונה!"); closeModal('deleteModal'); return; }
            lists = lists.filter(id => id !== currentListId);
            localStorage.setItem('myLists', JSON.stringify(lists));
            database.ref('all_lists/' + currentListId).remove();
            closeModal('deleteModal'); updateDropdown(); switchList(lists[0]);
        }

        function switchList(id) { loadListData(id, true); window.history.pushState({}, '', '?list=' + id); }
        function closeModal(id) { document.getElementById(id).style.display = 'none'; }
        
        function updateQuickSelect() {
            const cat = document.getElementById('itemCat').value;
            const items = templates[currentType].items[cat] || [];
            document.getElementById('quickSelect').innerHTML = '<option value="">בחר...</option>' + items.map(i => `<option value="${i}">${i}</option>`).join('');
        }

        function toggleStatus(id, s) { 
            if (!s && navigator.vibrate) navigator.vibrate([30, 50, 30]); 
            database.ref('all_lists/'+currentListId+'/items/'+id).update({collected: !s}); 
        }
        function del(id) { if(confirm("למחוק פריט זה?")) database.ref('all_lists/'+currentListId+'/items/'+id).remove(); }
        function saveListName(n) { database.ref('all_lists/'+currentListId+'/metadata/name').set(n); updateDropdown(); }
        function handleShareAction() { navigator.share ? navigator.share({title:'הקניות שלי', url: window.location.href}) : alert("העתק את הלינק לדפדפן"); }

        async function updateDropdown() {
            const d = document.getElementById('myListsDropdown');
            let l = JSON.parse(localStorage.getItem('myLists')) || []; d.innerHTML = "";
            for (let i = 0; i < l.length; i++) {
                const s = await database.ref('all_lists/'+l[i]+'/metadata').once('value');
                const meta = s.val() || { name: "רשימה", type: "super" };
                const typeName = templates[meta.type] ? templates[meta.type].title : 'כללי';
                
                const o = document.createElement('option'); o.value = l[i]; 
                o.text = `${meta.name} (${typeName})`; 
                if(l[i] === currentListId) o.selected = true; d.add(o);
            }
        }
        window.onload = init;
    </script>
</body>
</html>
