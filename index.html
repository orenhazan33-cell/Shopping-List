<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>הקניות של אורן - גרסת המוח</title>
    <link rel="manifest" href="./manifest.json">
    <meta name="theme-color" content="#4a90e2">
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
    <style>
        :root { --primary: #4a90e2; --secondary: #2ecc71; --danger: #e74c3c; }
        * { box-sizing: border-box; }
        body { font-family: 'Segoe UI', sans-serif; margin: 0; padding-bottom: 110px; background: #f4f7f9; direction: rtl; text-align: right; }
        .app-container { width: 95%; max-width: 500px; margin: 15px auto; }
        .control-panel { background: white; border-radius: 20px; padding: 18px; box-shadow: 0 8px 25px rgba(0,0,0,0.05); border-top: 6px solid var(--primary); }
        .input-group { display: flex; flex-direction: column; gap: 12px; }
        .row { display: flex; gap: 8px; align-items: center; }
        select, input { padding: 12px; border: 2px solid #f0f0f0; border-radius: 12px; font-size: 16px; outline: none; flex: 1; text-align: right; }
        .btn { padding: 12px; border: none; border-radius: 12px; cursor: pointer; font-weight: bold; }
        .btn-add { background: var(--primary); color: white; flex: 2; }
        
        /* השלמה אוטומטית */
        .suggestions-wrapper { position: relative; flex: 1; }
        .suggestions-box { 
            position: absolute; top: 100%; left: 0; right: 0; background: white; 
            border-radius: 12px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); 
            z-index: 2000; display: none; max-height: 200px; overflow-y: auto; 
        }
        .suggestion-item { padding: 12px; border-bottom: 1px solid #eee; cursor: pointer; display: flex; justify-content: space-between; }
        .suggestion-item:hover { background: #f0f7ff; }

        li { background: white; margin-bottom: 8px; padding: 15px; border-radius: 15px; display: flex; align-items: center; gap: 12px; border-right: 6px solid var(--primary); box-shadow: 0 2px 5px rgba(0,0,0,0.03); }
        .collected { opacity: 0.4; text-decoration: line-through; filter: grayscale(1); }
        .budget-bar { position: fixed; bottom: 0; left: 0; right: 0; background: #2c3e50; color: white; padding: 18px; display: flex; justify-content: space-around; font-weight: bold; z-index: 1001; }
    </style>
</head>
<body>
    <div class="app-container">
        <div class="control-panel">
            <input type="text" id="listNameInput" style="font-size:20px; font-weight:bold; border:none; width:100%; margin-bottom:10px;" onblur="saveListName(this.value)">
            <div class="input-group">
                <div class="row">
                    <select id="itemCat"></select>
                    <input type="number" id="itemPrice" placeholder="₪ מחיר">
                </div>
                <div class="row">
                    <div class="suggestions-wrapper">
                        <input type="text" id="itemInput" placeholder="מה לקנות?" oninput="handleAutocomplete(this.value)" autocomplete="off">
                        <div id="suggestions" class="suggestions-box"></div>
                    </div>
                    <input type="number" id="itemQty" value="1" style="max-width: 55px;">
                </div>
                <button class="btn btn-add" onclick="addItem()">הוסף</button>
            </div>
        </div>
        <ul id="shoppingList"></ul>
        <ul id="collectedList"></ul>
    </div>
    <div class="budget-bar">
        <div>צפי: <span id="sumP">0</span> ₪</div>
        <div>בסל: <span id="sumC">0</span> ₪</div>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyCb7dApdjqPB6Fip9rW-QxoNbTZBow6rkQ",
            authDomain: "shopping-list-7c4fa.firebaseapp.com",
            databaseURL: "https://shopping-list-7c4fa-default-rtdb.europe-west1.firebasedatabase.app",
            projectId: "shopping-list-7c4fa",
            storageBucket: "shopping-list-7c4fa.firebasestorage.app",
            messagingSenderId: "482760938255",
            appId: "1:482760938255:web:99e0dd53cb822a8327e47a"
        };
        firebase.initializeApp(firebaseConfig);
        const database = firebase.database();
        let currentListId = new URLSearchParams(window.location.search).get('list') || 'list_general';
        let learnedDictionary = {};

        // מחירון בסיסי (אומדן)
        const basePrices = { 
            "חלב": 6.5, "ביצים": 13, "לחם": 8, "עוף": 35, "בשר טחון": 55, "עגבניה": 6, 
            "מלפפון": 5, "קוטג": 6, "גבינה צהובה": 15, "שמן": 12, "נייר טואלט": 32, "קפה": 30 
        };

        function init() {
            // טעינת מילון המוצרים שהמערכת למדה
            database.ref('global_dictionary').on('value', s => { learnedDictionary = s.val() || {}; });
            
            database.ref('all_lists/'+currentListId+'/metadata').on('value', s => {
                const meta = s.val() || { name: "רשימה כללית", type: "super" };
                document.getElementById('listNameInput').value = meta.name;
                updateCats(meta.type || "super");
            });
            database.ref('all_lists/'+currentListId+'/items').on('value', s => render(s.val()));
        }

        function updateCats(type) {
            const cats = { super: {meat:"🥩 בשר", dairy:"🥛 חלב", veg:"🥦 ירקות", gen:"📦 כללי"} };
            document.getElementById('itemCat').innerHTML = Object.entries(cats[type] || cats.super).map(([k,v]) => `<option value="${k}">${v}</option>`).join('');
        }

        function handleAutocomplete(val) {
            const box = document.getElementById('suggestions');
            if (val.length < 1) { box.style.display = 'none'; return; }

            // איחוד המילון הבסיסי עם המילון הנלמד
            const allItems = { ...basePrices, ...learnedDictionary };
            const filtered = Object.keys(allItems).filter(i => i.includes(val)).slice(0, 5);

            if (filtered.length > 0) {
                box.innerHTML = filtered.map(name => `
                    <div class="suggestion-item" onclick="selectItem('${name}', ${allItems[name]})">
                        <span>${name}</span>
                        <small style="color:#2ecc71">${allItems[name]}₪</small>
                    </div>
                `).join('');
                box.style.display = 'block';
            } else { box.style.display = 'none'; }
        }

        function selectItem(name, price) {
            document.getElementById('itemInput').value = name;
            document.getElementById('itemPrice').value = price;
            document.getElementById('suggestions').style.display = 'none';
        }

        function addItem() {
            const text = document.getElementById('itemInput').value.trim();
            const price = parseFloat(document.getElementById('itemPrice').value) || 0;
            if(!text) return;

            // למידה: שמירת המחיר והמוצר למילון הגלובלי
            database.ref('global_dictionary/' + text).set(price);

            database.ref('all_lists/'+currentListId+'/items').push({
                text, price, qty: document.getElementById('itemQty').value, 
                category: document.getElementById('itemCat').value, collected: false
            });
            document.getElementById('itemInput').value = ""; document.getElementById('itemPrice').value = "";
        }

        function render(data) {
            const todo = document.getElementById('shoppingList'), done = document.getElementById('collectedList');
            todo.innerHTML = ""; done.innerHTML = "";
            let p = 0, c = 0;
            for (let id in data) {
                const item = data[id];
                const total = (item.price || 0) * (item.qty || 1);
                p += total; if(item.collected) c += total;
                const li = document.createElement('li');
                li.className = item.collected ? 'collected' : '';
                li.innerHTML = `<div onclick="toggle('${id}', ${item.collected})" style="flex:1"><b>${item.qty}</b> | ${item.text} ${total > 0 ? `<span style="color:#2ecc71">(${total}₪)</span>` : ''}</div><span onclick="del('${id}')">🗑️</span>`;
                (item.collected ? done : todo).appendChild(li);
            }
            document.getElementById('sumP').innerText = p.toFixed(1);
            document.getElementById('sumC').innerText = c.toFixed(1);
        }

        function toggle(id, s) { database.ref('all_lists/'+currentListId+'/items/'+id).update({collected: !s}); }
        function del(id) { if(confirm("למחוק?")) database.ref('all_lists/'+currentListId+'/items/'+id).remove(); }
        function saveListName(n) { database.ref('all_lists/'+currentListId+'/metadata/name').set(n); }
        init();
    </script>
</body>
</html>
