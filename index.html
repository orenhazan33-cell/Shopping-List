<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>רשימת קניות משותפת</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
    
    <style>
        body { font-family: Arial, sans-serif; background-color: #f4f4f9; display: flex; justify-content: center; padding: 20px; }
        .container { background: white; padding: 20px; border-radius: 10px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); width: 100%; max-width: 400px; text-align: center; }
        input { width: 70%; padding: 10px; border: 1px solid #ccc; border-radius: 5px; }
        button { padding: 10px; cursor: pointer; background-color: #28a745; color: white; border: none; border-radius: 5px; }
        ul { list-style: none; padding: 0; margin-top: 20px; }
        li { background: #eee; margin: 5px 0; padding: 10px; display: flex; justify-content: space-between; border-radius: 5px; align-items: center; }
        .delete-btn { color: red; cursor: pointer; font-weight: bold; margin-right: 10px; }
        .clear-btn { background-color: #dc3545; margin-top: 20px; width: 100%; }
    </style>
</head>
<body>

    <div class="container">
        <h1>🛒 רשימת קניות</h1>
        <input type="text" id="itemInput" placeholder="מה צריך לקנות?">
        <button onclick="addItem()">הוסף</button>
        <ul id="shoppingList"></ul>
        <button class="clear-btn" onclick="clearAll()">מחק את כל הרשימה</button>
    </div>

    <script>
        // --- הגדרות Firebase שלך (מעודכן לאירופה) ---
        const firebaseConfig = {
            apiKey: "AIzaSyAzY7vM6_O_v6S9_I1-F_X9_I1-F_X9_I1", // וודא שזה המפתח שלך
            authDomain: "shopping-list-85f62.firebaseapp.com",
            databaseURL: "https://shopping-list-85f62-default-rtdb.europe-west1.firebasedatabase.app",
            projectId: "shopping-list-85f62",
            storageBucket: "shopping-list-85f62.appspot.com",
            messagingSenderId: "367341514781",
            appId: "1:367341514781:web:50f7f3f1a2075586618e9a"
        };

        // אתחול Firebase
        firebase.initializeApp(firebaseConfig);
        const database = firebase.database();
        const listRef = database.ref('items');

        // פונקציה להוספת פריט
        function addItem() {
            const input = document.getElementById('itemInput');
            const val = input.value.trim();
            if (val === "") return;
            
            listRef.push({
                text: val
            });
            input.value = ""; // ניקוי התיבה
        }

        // האזנה לשינויים והצגה בזמן אמת
        listRef.on('value', (snapshot) => {
            const listElement = document.getElementById('shoppingList');
            listElement.innerHTML = ""; 
            
            const data = snapshot.val();
            for (let id in data) {
                const li = document.createElement('li');
                li.innerHTML = `
                    <span>${data[id].text}</span>
                    <span class="delete-btn" onclick="deleteItem('${id}')">❌</span>
                `;
                listElement.appendChild(li);
            }
        });

        // פונקציה למחיקת פריט בודד
        function deleteItem(id) {
            database.ref('items/' + id).remove();
        }

        // פונקציה למחיקת כל הרשימה
        function clearAll() {
            if (confirm("בטוח שרוצה למחוק את כל הרשימה?")) {
                listRef.remove();
            }
        }
    </script>

</body>
</html>
