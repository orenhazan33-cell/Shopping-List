<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>הקניות של אורן - VIP Animations</title>
    <link rel="manifest" href="./manifest.json">
    <meta name="theme-color" content="#1e272e">
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
    <style>
        :root {
            --primary: linear-gradient(135deg, #0984e3 0%, #00cec9 100%);
            --secondary: #2ecc71; --danger: #ff4757; --share: #6c5ce7;
            --glass: rgba(255, 255, 255, 0.92);
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

        body { 
            font-family: 'Segoe UI', system-ui, sans-serif; 
            margin: 0; padding-bottom: 140px; 
            min-height: 100vh; background-attachment: fixed;
            background-size: cover; transition: all 0.5s ease;
            direction: rtl; text-align: right; overflow-x: hidden;
        }

        /* --- רקעים מותאמים --- */
        body.theme-super { background: #dfe6e9; background-image: radial-gradient(#636e72 0.5px, transparent 0.5px); background-size: 15px 15px; }
        body.theme-birthday { background: #fab1a0; background-image: linear-gradient(120deg, #ff9a9e 0%, #fecfef 100%); }
        body.theme-wedding { background: #f7f1e3; background-image: linear-gradient(to top, #fff1eb 0%, #ace0f9 100%); }
        body.theme-bar { background: #a29bfe; background-image: linear-gradient(120deg, #cfd9df 0%, #e2ebf0 100%); }

        /* --- מנוע האנימציות --- */
        #animation-container { position: fixed; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 5000; overflow: hidden; }

        @keyframes flyUp {
            0% { transform: translateY(110vh) rotate(0deg); opacity: 1; }
            100% { transform: translateY(-20vh) rotate(20deg); opacity: 0; }
        }
        .balloon { position: absolute; font-size: 40px; animation: flyUp 4s ease-in forwards; opacity: 0; }

        @keyframes confettiFall {
            0% { transform: translateY(-10vh) rotate(0deg); opacity: 1; }
            100% { transform: translateY(110vh) rotate(720deg); opacity: 0; }
        }
        .confetti { position: absolute; width: 15px; height: 15px; animation: confettiFall 5s linear forwards; opacity: 0; }

        @keyframes cartDrive {
            0% { transform: translateX(110vw); opacity: 1; }
            100% { transform: translateX(-110vw); opacity: 1; }
        }
        .cart-mascot { position: absolute; top: 60%; font-size: 80px; animation: cartDrive 3s linear forwards; }

        @keyframes starPop {
            0% { transform: translate(-50%, -50%) scale(0) rotate(0); opacity: 0; }
            50% { transform: translate(-50%, -50%) scale(1.2) rotate(180deg); opacity: 1; }
            100% { transform: translate(-50%, -50%) scale(1) rotate(360deg); opacity: 0; }
        }
        .star-mascot { position: absolute; top: 50%; left: 50%; font-size: 150px; transform: translate(-50%, -50%) scale(0); animation: starPop 2s ease-out forwards; color: #1a237e; text-shadow: 0 10px 30px rgba(0,0,0,0.3); }

        /* --- עיצוב יוקרתי --- */
        .modal-overlay { position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.85); z-index: 3000; display: none; align-items: center; justify-content: center; backdrop-filter: blur(12px); }
        .app-modal { background: white; width: 90%; max-width: 440px; border-radius: 40px; padding: 40px; text-align: center; box-shadow: 0 30px 60px rgba(0,0,0,0.5); }

        .top-nav { background: var(--glass); backdrop-filter: blur(15px); padding: 18px; display: flex; gap: 12px; position: sticky; top: 0; z-index: 1000; box-shadow: 0 4px 20px rgba(0,0,0,0.08); align-items: center; }
        .app-container { width: 94%; max-width: 500px; margin: 25px auto; }
        .control-panel { background: var(--glass); border-radius: 40px; padding: 25px; box-shadow: 0 20px 40px rgba(0,0,0,0.1); }
        
        input, select { padding: 18px; border: 2px solid #edf2f7; border-radius: 22px; font-size: 16px; outline: none; background: #fff; width: 100%; transition: 0.3s; }
        input:focus { border-color: #0984e3; box-shadow: 0 0 10px rgba(9,132,227,0.1); }
        
        .btn { padding: 18px; border: none; border-radius: 22px; cursor: pointer; font-weight: 900; font-size: 17px; display: flex; align-items: center; justify-content: center; gap: 12px; transition: 0.3s; box-shadow: 0 10px 25px rgba(0,0,0,0.15); }
        .btn:active { transform: scale(0.94); }
        .btn-add { background: var(--primary); color: white; width: 100%; }
        .btn-share { background: var(--share); color: white; width: 100%; margin-top: 10px; }
        .btn-danger { background: var(--danger); color: white; width: auto; padding: 15px; border-radius: 18px; margin: 0; font-size: 20px; box-shadow: none; }

        li { background: white; margin-bottom: 15px; padding: 22px; border-radius: 28px; display: flex; align-items: center; justify-content: space-between; box-shadow: 0 12px 20px rgba(0,0,0,0.04); border-right: 12px solid #0984e3; }
        .collected { opacity: 0.45; filter: grayscale(1); }

        .budget-bar { position: fixed; bottom: 0; left: 0; right: 0; background: rgba(45, 52, 54, 0.98); color: white; padding: 28px; display: flex; justify-content: space-around; z-index: 1001; border-radius: 45px 45px 0 0; box-shadow: 0 -15px 35px rgba(0,0,0,0.3); }
        .budget-val { font-size: 24px; color: #55efc4; font-weight: 900; }

        .suggestions-box { position: absolute; background: white; width: 100%; border-radius: 25px; box-shadow: 0 20px 40px rgba(0,0,0,0.2); z-index: 2000; display: none; margin-top: 60px; border: 1px solid #edf2f7; overflow: hidden; }
        .suggestion-item { padding: 18px; border-bottom: 1px solid #f1f2f6; cursor: pointer; display: flex; justify-content: space-between; font-weight: 700; color: #2d3436; }
        .suggestion-item:active { background: #f8f9fa; }
    </style>
</head>
<body class="theme-super">

    <div id="animation-container"></div>

    <div id="welcomeModal" class="modal-overlay">
        <div class="app-modal">
            <h1 style="margin-top:0; font-size:38px; color: #0984e3;">היי אורן! 👋</h1>
            <p style="font-size:19px; color:#2d3436; font-weight: 500;">האפליקציה המלאה והיציבה מוכנה.</p>
            <button class="btn btn-add" onclick="closeWelcome()">בוא נתחיל קניות</button>
        </div>
    </div>

    <div id="deleteModal" class="modal-overlay">
        <div class="app-modal">
            <h2 style="color: var(--danger); margin-top:0;">מחיקת רשימה? 🗑️</h2>
            <p style="font-size:18px; color:#2d3436;">בטוח שרוצים למחוק את הרשימה הזו לתמיד?</p>
            <div style="display:flex; gap:12px; margin-top:25px;">
                <button class="btn btn-danger" style="flex:2" onclick="confirmDeleteList()">כן, למחוק</button>
                <button class="btn" style="flex:1; background:#f1f2f6; color:#2d3436; box-shadow:none;" onclick="closeModal('deleteModal')">ביטול</button>
            </div>
        </div>
    </div>

    <div id="newListModal" class="modal-overlay">
        <div class="app-modal">
            <h2 style="margin-top:0;">רשימה חדשה</h2>
            <input type="text" id="newListName" placeholder="איך לקרוא לרשימה?" style="margin-bottom:15px;">
            <select id="newListType" style="margin-bottom:25px;">
                <option value="super">🛒 סופר רגיל</option>
                <option value="bar">✡️ בר מצווה</option>
                <option value="wedding">👰 חתונה</option>
                <option value="birthday">🎈 יום הולדת</option>
            </select>
            <div style="display:flex; gap:12px;">
                <button class="btn btn-add" style="flex:2" onclick="createNewList()">צור עכשיו</button>
                <button class="btn" style="flex:1; background:#f1f2f6; color:#2d3436; box-shadow:none;" onclick="closeModal('newListModal')">ביטול</button>
            </div>
        </div>
    </div>

    <div class="top-nav">
        <select id="myListsDropdown" onchange="switchList(this.value)" style="flex:1; font-weight:900; border:none; background:none; font-size: 18px; color: #2d3436; margin: 0; padding: 5px;"></select>
        <button class="btn-danger" title="מחק רשימה" onclick="document.getElementById('deleteModal').style.display='flex'">🗑️</button>
        <button class="btn btn-add" style="padding:0 25px; margin:0; width: auto; font-size: 24px;" onclick="document.getElementById('newListModal').style.display='flex'">+</button>
    </div>

    <div class="app-container">
        <div class="control-panel">
            <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:20px;">
                <input type="text" id="listNameInput" style="font-size:24px; font-weight:900; border:none; outline:none; background:none; flex:1; color:#2d3436; padding:0;" onblur="saveListName(this.value)">
                <span onclick="document.getElementById('listNameInput').focus()" style="cursor:pointer; font-size:22px;">✏️</span>
            </div>
            <div style="display:flex; flex-direction:column; gap:15px;">
                <div style="display:flex; gap:10px;">
                    <select id="itemCat" onchange="updateQuickSelect()" style="flex:2"></select>
                    <select id="quickSelect" onchange="useQuick(this.value)" style="flex:1"><option value="">הצג</option></select>
                </div>
                <div style="position: relative;">
                    <input type="text" id="itemInput" placeholder="מה קונים?" oninput="handleAuto(this.value)" autocomplete="off">
                    <div id="suggestions" class="suggestions-box"></div>
                </div>
                <div style="display:flex; gap:10px;">
                    <input type="number" id="itemPrice" placeholder="₪ מחיר" style="flex:1; text-align:center;">
                    <input type="number" id="itemQty" value="1" style="max-width:85px; text-align:center;">
                </div>
                <button class="btn btn-add" onclick="addItem()">הוסף לרשימה</button>
                <button class="btn btn-share" onclick="handleShareAction()">📤 שתף רשימה לחברים</button>
            </div>
        </div>
        <ul id="shoppingList"></ul>
        <ul id="collectedList"></ul>
    </div>

    <div class="budget-bar">
        <div style="text-align:center;">צפי כולל<br><span id="sumP" style="font-size:22px; color:#74b9ff; font-weight:900;">0</span></div>
        <div style="text-align:center;">בסל כרגע<br><span id="sumC" style="font-size:22px; color:#55efc4; font-weight:900;">0</span></div>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyCb7dApdjqPB6Fip9rW-QxoNbTZBow6rkQ",
            authDomain: "shopping-list-7c4fa.firebaseapp.com",
            databaseURL: "https://shopping-list-7c4fa-default-rtdb.europe-west1.firebasedatabase.app",
            projectId: "shopping-list-7c4fa",
            storageBucket: "shopping-list-7c4fa.firebasestorage.app",
            messagingSenderId: "482760938255",
            appId: "1:482760938255:web:99e0dd53cb822a8327e47a"
        };
        firebase.initializeApp(firebaseConfig);
        const database = firebase.database();
        
        let currentListId = new URLSearchParams(window.location.search).get('list') || (JSON.parse(localStorage.getItem('myLists')) || ['list_general'])[0];
        let currentType = "super", learnedPrices = {};

        const templates = {
            super: { theme: 'theme-super', cats: {meat:"🥩 בשר", dairy:"🥛 חלב", veg:"🥦 ירקות"}, items: {meat:["עוף"], dairy:["חלב"]} },
            birthday: { theme: 'theme-birthday', cats: {party:"🎈 מסיבה", sweet:"🍰 מתוקים"}, items: {party:["בלונים"], sweet:["עוגה"]} },
            bar: { theme: 'theme-bar', cats: {sweets:"🍬 סוכריות", relig:"✡️ קדושה"}, items: {relig:["כיפות"]} },
            wedding: { theme: 'theme-wedding', cats: {gift:"🎁 מתנות", log:"👰 לוגיסטיקה"}, items: {log:["טבעות"]} }
        };

        const basePrices = { "חלב": 6.5, "ביצים": 13, "לחם": 8, "עוף": 35 };

        function init() {
            loadListData(currentListId, false);
            updateDropdown();
            database.ref('global_dictionary').on('value', s => learnedPrices = s.val() || {});
        }

        // --- מנוע האנימציות הראשי ---
        function triggerAnimation(type) {
            const container = document.getElementById('animation-container');
            container.innerHTML = ''; 

            if (type === 'birthday') {
                const balloons = ['🎈', '🎁', '🎂'];
                for (let i = 0; i < 15; i++) {
                    const b = document.createElement('div');
                    b.className = 'balloon';
                    b.innerText = balloons[Math.floor(Math.random() * balloons.length)];
                    b.style.left = Math.random() * 100 + 'vw';
                    b.style.animationDelay = Math.random() * 1.5 + 's';
                    container.appendChild(b);
                }
            } else if (type === 'wedding') {
                const colors = ['#d4af37', '#ffffff', '#f1c40f'];
                for (let i = 0; i < 40; i++) {
                    const c = document.createElement('div');
                    c.className = 'confetti';
                    c.style.background = colors[Math.floor(Math.random() * colors.length)];
                    c.style.left = Math.random() * 100 + 'vw';
                    c.style.animationDelay = Math.random() * 2 + 's';
                    container.appendChild(c);
                }
            } else if (type === 'super') {
                const cart = document.createElement('div');
                cart.className = 'cart-mascot';
                cart.innerText = '🛒';
                container.appendChild(cart);
            } else if (type === 'bar') {
                const star = document.createElement('div');
                star.className = 'star-mascot';
                star.innerText = '✡️';
                container.appendChild(star);
            }
            
            setTimeout(() => { container.innerHTML = ''; }, 5500);
        }

        function loadListData(id, showMascot = true) {
            database.ref('all_lists/'+currentListId+'/metadata').off();
            database.ref('all_lists/'+currentListId+'/items').off();
            currentListId = id;
            database.ref('all_lists/'+id+'/metadata').on('value', s => {
                const meta = s.val() || { name: "רשימה", type: "super" };
                document.getElementById('listNameInput').value = meta.name;
                currentType = meta.type || "super";
                document.body.className = templates[currentType].theme;
                
                if(showMascot) triggerAnimation(currentType);
                
                document.getElementById('itemCat').innerHTML = Object.entries(templates[currentType].cats).map(([k,v]) => `<option value="${k}">${v}</option>`).join('');
                updateQuickSelect();
            });
            database.ref('all_lists/'+id+'/items').on('value', s => render(s.val()));
        }

        function render(data) {
            const todo = document.getElementById('shoppingList'), done = document.getElementById('collectedList');
            todo.innerHTML = ""; done.innerHTML = "";
            let p = 0, c = 0;
            for (let id in data) {
                const item = data[id];
                const total = (item.price || 0) * (item.qty || 1);
                p += total; if(item.collected) c += total;
                const li = document.createElement('li');
                li.className = item.collected ? 'collected' : '';
                li.innerHTML = `<div onclick="toggleStatus('${id}',${item.collected})" style="flex:1; font-weight:800; color:#2d3436;">${item.qty} x ${item.text} <span style="color:#2ecc71; margin-right:12px;">${total>0 ? total+'₪' : ''}</span></div><span onclick="del('${id}')" style="cursor:pointer; font-size:22px; opacity:0.6;">🗑️</span>`;
                (item.collected ? done : todo).appendChild(li);
            }
            document.getElementById('sumP').innerText = p.toFixed(1) + " ₪";
            document.getElementById('sumC').innerText = c.toFixed(1) + " ₪";
        }

        // --- השלמה אוטומטית משופרת ---
        function handleAuto(v) {
            const box = document.getElementById('suggestions');
            if(v.length < 1) { box.style.display = 'none'; return; }
            
            const allItems = {...basePrices, ...learnedPrices};
            const filtered = Object.keys(allItems).filter(k => k.includes(v));
            
            if(filtered.length > 0) {
                box.innerHTML = filtered.map(k => `
                    <div class="suggestion-item" onclick="useQuick('${k}')">
                        <span>${k}</span> 
                        <small style="color:#2ecc71">${allItems[k]}₪</small>
                    </div>
                `).join('');
                box.style.display = 'block';
            } else {
                box.style.display = 'none';
            }
        }

        function useQuick(v) {
            const allItems = {...basePrices, ...learnedPrices};
            document.getElementById('itemInput').value = v;
            document.getElementById('itemPrice').value = allItems[v] || "";
            document.getElementById('suggestions').style.display = 'none';
        }

        function addItem() {
            const text = document.getElementById('itemInput').value.trim();
            if(!text) return;
            const price = parseFloat(document.getElementById('itemPrice').value) || 0;
            const qty = parseFloat(document.getElementById('itemQty').value) || 1;
            const cat = document.getElementById('itemCat').value;
            if(price > 0) database.ref('global_dictionary/' + text).set(price);
            database.ref('all_lists/'+currentListId+'/items').push({ text, price, qty, category: cat, collected: false });
            document.getElementById('itemInput').value = ""; document.getElementById('itemPrice').value = "";
        }

        function createNewList() {
            const name = document.getElementById('newListName').value;
            const type = document.getElementById('newListType').value;
            if(!name) return;
            const id = 'list_' + Date.now();
            database.ref('all_lists/'+id+'/metadata').set({name, type});
            let l = JSON.parse(localStorage.getItem('myLists')) || []; l.push(id);
            localStorage.setItem('myLists', JSON.stringify(l));
            closeModal('newListModal'); updateDropdown(); switchList(id);
        }

        // --- פונקציית מחיקת רשימה מלאה ---
        function confirmDeleteList() {
            let lists = JSON.parse(localStorage.getItem('myLists')) || [];
            if (lists.length <= 1) { 
                alert("לא ניתן למחוק את הרשימה האחרונה! צור רשימה חדשה קודם."); 
                closeModal('deleteModal'); 
                return; 
            }
            
            // מחיקה מהזיכרון המקומי
            lists = lists.filter(id => id !== currentListId);
            localStorage.setItem('myLists', JSON.stringify(lists));
            
            // מחיקה מהשרת (Firebase)
            database.ref('all_lists/' + currentListId).remove();
            
            closeModal('deleteModal'); 
            updateDropdown(); 
            switchList(lists[0]); // מעבר אוטומטי לרשימה הבאה
        }

        function switchList(id) { loadListData(id, true); window.history.pushState({}, '', '?list=' + id); }
        function closeModal(id) { document.getElementById(id).style.display = 'none'; }
        function closeWelcome() { localStorage.setItem('welcomeShown', 'true'); closeModal('welcomeModal'); }
        function updateQuickSelect() {
            const cat = document.getElementById('itemCat').value;
            const items = templates[currentType].items[cat] || [];
            document.getElementById('quickSelect').innerHTML = '<option value="">הצג</option>' + items.map(i => `<option value="${i}">${i}</option>`).join('');
        }
        function toggleStatus(id, s) { database.ref('all_lists/'+currentListId+'/items/'+id).update({collected: !s}); }
        function del(id) { if(confirm("למחוק פריט זה?")) database.ref('all_lists/'+currentListId+'/items/'+id).remove(); }
        function saveListName(n) { database.ref('all_lists/'+currentListId+'/metadata/name').set(n); }
        function handleShareAction() { navigator.share ? navigator.share({title:'הקניות שלי', url: window.location.href}) : alert("העתק את הלינק לדפדפן"); }

        async function updateDropdown() {
            const d = document.getElementById('myListsDropdown');
            let l = JSON.parse(localStorage.getItem('myLists')) || []; d.innerHTML = "";
            for (let i = 0; i < l.length; i++) {
                const s = await database.ref('all_lists/'+l[i]+'/metadata/name').once('value');
                const o = document.createElement('option'); o.value = l[i]; o.text = s.val() || "רשימה";
                if(l[i] === currentListId) o.selected = true; d.add(o);
            }
        }
        window.onload = init;
    </script>
</body>
</html>
