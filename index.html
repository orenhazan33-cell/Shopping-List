<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>הקניות של אורן - Black Edition</title>
    <link rel="manifest" href="./manifest.json">
    <meta name="theme-color" content="#1e272e">
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
    <style>
        :root {
            --primary: linear-gradient(135deg, #0984e3 0%, #00cec9 100%);
            --secondary: linear-gradient(135deg, #00b894 0%, #55efc4 100%);
            --share: linear-gradient(135deg, #6c5ce7 0%, #a29bfe 100%);
            --card-bg: rgba(255, 255, 255, 0.95);
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

        body { 
            font-family: 'Segoe UI', system-ui, sans-serif; 
            margin: 0; padding-bottom: 140px; 
            min-height: 100vh; background-color: #f1f2f6;
            background-attachment: fixed; background-size: cover;
            transition: all 0.5s ease; direction: rtl; text-align: right;
        }

        /* --- רקעים דינמיים --- */
        body.theme-super { background-image: radial-gradient(#d1d8e0 1px, transparent 1px); background-size: 20px 20px; }
        body.theme-birthday { 
            background: #f8a5c2;
            background-image: url("data:image/svg+xml,%3Csvg width='52' height='26' viewBox='0 0 52 26' xmlns='http://www.w3.org/2000/svg'%3E%3Cg fill='none' fill-rule='evenodd'%3E%3Cg fill='%23ffffff' fill-opacity='0.4'%3E%3Cpath d='M10 10c0-2.21-1.79-4-4-4-3.314 0-6-2.686-6-6h2c0 2.21 1.79 4 4 4 3.314 0 6 2.686 6 6 0 2.21 1.79 4 4 4h-2c-2.21 0-4-1.79-4-4zm2 0c0 2.21 1.79 4 4 4 3.314 0 6 2.686 6 6h-2c0-2.21-1.79-4-4-4-3.314 0-6-2.686-6-6 0-2.21-1.79-4-4-4h2c2.21 0 4 1.79 4 4zm28 2c0 2.21 1.79 4 4 4 3.314 0 6 2.686 6 6h-2c0-2.21-1.79-4-4-4-3.314 0-6-2.686-6-6 0-2.21-1.79-4-4-4h2c2.21 0 4 1.79 4 4zm2 0c0-2.21-1.79-4-4-4-3.314 0-6-2.686-6-6h2c0 2.21 1.79 4 4 4 3.314 0 6 2.686 6 6 0 2.21 1.79 4 4 4h-2c-2.21 0-4-1.79-4-4z'/%3E%3C/g%3E%3C/g%3E%3C/svg%3E");
            --primary: linear-gradient(135deg, #ef5777 0%, #574b90 100%);
        }
        body.theme-wedding { 
            background: #f7f1e3;
            background-image: url("data:image/svg+xml,%3Csvg width='40' height='40' viewBox='0 0 40 40' xmlns='http://www.w3.org/2000/svg'%3E%3Cpath d='M20 20.5V18H0.5c-.28 0-.5.22-.5.5v2c0 .28.22.5.5.5h19.5zM40 21c0-.28-.22-.5-.5-.5H20v2.5h19.5c.28 0 .5-.22.5-.5v-1.5z' fill='%23d4af37' fill-opacity='0.1'/%3E%3C/svg%3E");
            --primary: linear-gradient(135deg, #d4af37 0%, #aaa69d 100%);
        }
        body.theme-bar { background: #d1ccc0; --primary: linear-gradient(135deg, #2980b9 0%, #2c3e50 100%); }

        /* --- Mascot Style --- */
        #mascot {
            position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%) scale(0);
            font-size: 150px; z-index: 5000; pointer-events: none; transition: transform 0.6s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        #mascot.show { transform: translate(-50%, -50%) scale(1); animation: wobble 1s infinite; }
        @keyframes wobble { 0%, 100% { transform: translate(-50%, -50%) rotate(0deg); } 25% { transform: translate(-50%, -50%) rotate(-10deg); } 75% { transform: translate(-50%, -50%) rotate(10deg); } }

        .modal-overlay { position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.85); z-index: 3000; display: none; align-items: center; justify-content: center; backdrop-filter: blur(12px); }
        .app-modal { background: white; width: 90%; max-width: 440px; border-radius: 40px; padding: 40px; text-align: center; box-shadow: 0 30px 60px rgba(0,0,0,0.5); }
        
        .welcome-title {
            background: var(--primary); -webkit-background-clip: text; background-clip: text;
            -webkit-text-fill-color: transparent; font-size: 38px; margin-top: 0;
        }

        .top-nav { background: rgba(255,255,255,0.9); backdrop-filter: blur(15px); padding: 18px; display: flex; gap: 12px; position: sticky; top: 0; z-index: 1000; box-shadow: 0 4px 20px rgba(0,0,0,0.08); }
        .app-container { width: 94%; max-width: 500px; margin: 25px auto; }
        .control-panel { background: var(--card-bg); border-radius: 40px; padding: 25px; box-shadow: 0 20px 40px rgba(0,0,0,0.1); }
        
        .btn { padding: 18px; border: none; border-radius: 22px; cursor: pointer; font-weight: 900; font-size: 17px; display: flex; align-items: center; justify-content: center; gap: 12px; transition: 0.3s; box-shadow: 0 10px 25px rgba(0,0,0,0.15); }
        .btn-add { background: var(--primary); color: white; width: 100%; }

        ul { list-style: none; padding: 0; margin: 30px 0; }
        li { background: white; margin-bottom: 15px; padding: 22px; border-radius: 28px; display: flex; align-items: center; justify-content: space-between; box-shadow: 0 12px 20px rgba(0,0,0,0.04); border-right: 12px solid #0984e3; }
        .collected { opacity: 0.45; filter: grayscale(1); }

        .budget-bar { position: fixed; bottom: 0; left: 0; right: 0; background: rgba(45, 52, 54, 0.98); color: white; padding: 28px; display: flex; justify-content: space-around; z-index: 1001; border-radius: 45px 45px 0 0; }
        .suggestions-box { position: absolute; background: white; width: 100%; border-radius: 25px; box-shadow: 0 20px 40px rgba(0,0,0,0.2); z-index: 2000; display: none; margin-top: 60px; border: 1px solid #edf2f7; overflow: hidden; }
        .suggestion-item { padding: 18px; border-bottom: 1px solid #f1f2f6; cursor: pointer; display: flex; justify-content: space-between; font-weight: 700; }
    </style>
</head>
<body class="theme-super">

    <div id="mascot">🛒</div>

    <div id="welcomeModal" class="modal-overlay">
        <div class="app-modal">
            <h1 class="welcome-title">היי אורן! 👋</h1>
            <p style="font-size:19px; color:#2d3436; font-weight: 500;">העוזר האישי שלך לקניות מוכן.</p>
            <button class="btn btn-add" onclick="closeWelcome()">בוא נתחיל!</button>
        </div>
    </div>

    <div id="newListModal" class="modal-overlay">
        <div class="app-modal">
            <h2 style="margin-top:0;">רשימה חדשה</h2>
            <input type="text" id="newListName" placeholder="שם הרשימה..." style="margin-bottom:15px; padding:18px; border-radius:22px; border:2px solid #eee; width:100%;">
            <select id="newListType" style="margin-bottom:25px; padding:18px; border-radius:22px; border:2px solid #eee; width:100%;">
                <option value="super">🛒 סופר</option>
                <option value="bar">✡️ בר מצווה</option>
                <option value="wedding">👰 חתונה</option>
                <option value="birthday">🎈 יום הולדת</option>
            </select>
            <div style="display:flex; gap:12px;">
                <button class="btn btn-add" style="flex:2" onclick="createNewList()">צור</button>
                <button class="btn" style="flex:1; background:#f1f2f6;" onclick="closeModal('newListModal')">ביטול</button>
            </div>
        </div>
    </div>

    <div class="top-nav">
        <select id="myListsDropdown" onchange="switchList(this.value)" style="flex:1; border:none; background:none; font-weight:900;"></select>
        <button class="btn btn-add" style="padding:0 28px; margin-top:0; width: auto;" onclick="document.getElementById('newListModal').style.display='flex'">+</button>
    </div>

    <div class="app-container">
        <div class="control-panel">
            <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:20px;">
                <input type="text" id="listNameInput" style="font-size:24px; font-weight:900; border:none; outline:none; background:none; flex:1;" onblur="saveListName(this.value)">
                <span onclick="document.getElementById('listNameInput').focus()" style="cursor:pointer; font-size:22px;">✏️</span>
            </div>
            <div style="display:flex; flex-direction:column; gap:15px;">
                <div style="display:flex; gap:10px;">
                    <select id="itemCat" onchange="updateQuickSelect()" style="flex:2; padding:15px; border-radius:18px; border:2px solid #f1f2f6;"></select>
                    <select id="quickSelect" onchange="useQuick(this.value)" style="flex:1; padding:15px; border-radius:18px; border:2px solid #f1f2f6;"><option value="">הצג</option></select>
                </div>
                <div style="position: relative;">
                    <input type="text" id="itemInput" placeholder="מה קונים?" oninput="handleAuto(this.value)" autocomplete="off" style="padding:18px; border-radius:22px; border:2px solid #f1f2f6; width:100%;">
                    <div id="suggestions" class="suggestions-box"></div>
                </div>
                <div style="display:flex; gap:10px;">
                    <input type="number" id="itemPrice" placeholder="₪" style="flex:1; padding:18px; border-radius:22px; border:2px solid #f1f2f6; text-align:center;">
                    <input type="number" id="itemQty" value="1" style="width:80px; padding:18px; border-radius:22px; border:2px solid #f1f2f6; text-align:center;">
                </div>
                <button class="btn btn-add" onclick="addItem()">הוסף לרשימה</button>
                <button class="btn" style="background:var(--share); color:white;" onclick="handleShareAction()">📤 שתף</button>
            </div>
        </div>

        <ul id="shoppingList"></ul>
        <ul id="collectedList"></ul>
    </div>

    <div class="budget-bar">
        <div style="text-align:center;">צפי<br><span id="sumP" style="font-size:24px; color:#74b9ff; font-weight:900;">0</span></div>
        <div style="text-align:center;">בסל<br><span id="sumC" style="font-size:24px; color:#55efc4; font-weight:900;">0</span></div>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyCb7dApdjqPB6Fip9rW-QxoNbTZBow6rkQ",
            authDomain: "shopping-list-7c4fa.firebaseapp.com",
            databaseURL: "https://shopping-list-7c4fa-default-rtdb.europe-west1.firebasedatabase.app",
            projectId: "shopping-list-7c4fa",
            storageBucket: "shopping-list-7c4fa.firebasestorage.app",
            messagingSenderId: "482760938255",
            appId: "1:482760938255:web:99e0dd53cb822a8327e47a"
        };
        firebase.initializeApp(firebaseConfig);
        const database = firebase.database();
        
        let currentListId = new URLSearchParams(window.location.search).get('list') || (JSON.parse(localStorage.getItem('myLists')) || ['list_general'])[0];
        let currentType = "super", learnedPrices = {};

        const templates = {
            super: { theme: 'theme-super', icon: '🛒', cats: {meat:"🥩 בשר", dairy:"🥛 חלב", veg:"🥦 ירקות", gen:"📦 כללי"}, items: {meat:["עוף","בשר"], dairy:["חלב","גבינה"]} },
            birthday: { theme: 'theme-birthday', icon: '🎈', cats: {party:"🎈 מסיבה", sweet:"🍰 מתוקים"}, items: {party:["בלונים","נרות"], sweet:["עוגה"]} },
            bar: { theme: 'theme-bar', icon: '✡️', cats: {sweets:"🍬 סוכריות", relig:"✡️ קדושה"}, items: {sweets:["סוכריות"], relig:["כיפות"]} },
            wedding: { theme: 'theme-wedding', icon: '👰', cats: {gift:"🎁 מתנות", log:"👰 לוגיסטיקה"}, items: {log:["טבעות"]} }
        };

        const basePrices = { "חלב": 6.5, "ביצים": 13, "לחם": 8, "עוף": 35 };

        function init() {
            loadListData(currentListId, false);
            updateDropdown();
            database.ref('global_dictionary').on('value', s => { learnedPrices = s.val() || {}; });
        }

        function triggerMascot(icon) {
            const m = document.getElementById('mascot');
            m.innerText = icon; m.classList.add('show');
            setTimeout(() => { m.classList.remove('show'); }, 1500);
        }

        function loadListData(id, showMascot = true) {
            database.ref('all_lists/'+currentListId+'/metadata').off();
            database.ref('all_lists/'+currentListId+'/items').off();
            currentListId = id;
            database.ref('all_lists/'+id+'/metadata').on('value', s => {
                const meta = s.val() || { name: "רשימה", type: "super" };
                document.getElementById('listNameInput').value = meta.name;
                currentType = meta.type || "super";
                document.body.className = templates[currentType].theme;
                if(showMascot) triggerMascot(templates[currentType].icon);
                document.getElementById('itemCat').innerHTML = Object.entries(templates[currentType].cats).map(([k,v]) => `<option value="${k}">${v}</option>`).join('');
                updateQuickSelect();
            });
            database.ref('all_lists/'+id+'/items').on('value', s => render(s.val()));
        }

        function render(data) {
            const todo = document.getElementById('shoppingList'), done = document.getElementById('collectedList');
            todo.innerHTML = ""; done.innerHTML = "";
            let p = 0, c = 0;
            for (let id in data) {
                const item = data[id];
                const total = (item.price || 0) * (item.qty || 1);
                p += total; if(item.collected) c += total;
                const li = document.createElement('li');
                li.className = item.collected ? 'collected' : '';
                li.innerHTML = `<div onclick="toggleStatus('${id}',${item.collected})" style="flex:1; font-weight:800;">${item.qty} x ${item.text} <span>${total>0 ? total+'₪' : ''}</span></div><span onclick="del('${id}')">🗑️</span>`;
                (item.collected ? done : todo).appendChild(li);
            }
            document.getElementById('sumP').innerText = p.toFixed(1) + " ₪";
            document.getElementById('sumC').innerText = c.toFixed(1) + " ₪";
        }

        function handleAuto(v) {
            const box = document.getElementById('suggestions');
            if(v.length < 1) { box.style.display = 'none'; return; }
            const all = {...basePrices, ...learnedPrices};
            const filtered = Object.keys(all).filter(k => k.includes(v));
            if(filtered.length > 0) {
                box.innerHTML = filtered.map(k => `<div class="suggestion-item" onclick="useQuick('${k}')"><span>${k}</span> <small>${all[k]}₪</small></div>`).join('');
                box.style.display = 'block';
            } else box.style.display = 'none';
        }

        function useQuick(v) {
            const all = {...basePrices, ...learnedPrices};
            document.getElementById('itemInput').value = v;
            document.getElementById('itemPrice').value = all[v] || "";
            document.getElementById('suggestions').style.display = 'none';
        }

        function addItem() {
            const text = document.getElementById('itemInput').value.trim();
            if(!text) return;
            const price = parseFloat(document.getElementById('itemPrice').value) || 0;
            if(price > 0) database.ref('global_dictionary/' + text).set(price);
            database.ref('all_lists/'+currentListId+'/items').push({ text, price, qty: document.getElementById('itemQty').value, category: document.getElementById('itemCat').value, collected: false });
            document.getElementById('itemInput').value = ""; document.getElementById('itemPrice').value = "";
        }

        function createNewList() {
            const name = document.getElementById('newListName').value;
            const type = document.getElementById('newListType').value;
            if(!name) return;
            const id = 'list_' + Date.now();
            database.ref('all_lists/'+id+'/metadata').set({name, type});
            let l = JSON.parse(localStorage.getItem('myLists')) || []; l.push(id);
            localStorage.setItem('myLists', JSON.stringify(l));
            closeModal('newListModal'); updateDropdown(); switchList(id);
        }

        function switchList(id) { loadListData(id, true); window.history.pushState({}, '', '?list=' + id); }
        function closeModal(id) { document.getElementById(id).style.display = 'none'; }
        function closeWelcome() { localStorage.setItem('welcomeShown', 'true'); closeModal('welcomeModal'); }
        function updateQuickSelect() {
            const cat = document.getElementById('itemCat').value;
            const items = templates[currentType].items[cat] || [];
            document.getElementById('quickSelect').innerHTML = '<option value="">הצג</option>' + items.map(i => `<option value="${i}">${i}</option>`).join('');
        }
        function toggleStatus(id, s) { database.ref('all_lists/'+currentListId+'/items/'+id).update({collected: !s}); }
        function del(id) { if(confirm("למחוק?")) database.ref('all_lists/'+currentListId+'/items/'+id).remove(); }
        function saveListName(n) { database.ref('all_lists/'+currentListId+'/metadata/name').set(n); }
        function handleShareAction() { navigator.share({title:'הקניות שלי', url: window.location.href}); }

        async function updateDropdown() {
            const d = document.getElementById('myListsDropdown');
            let l = JSON.parse(localStorage.getItem('myLists')) || []; d.innerHTML = "";
            for (const id of l) {
                const s = await database.ref('all_lists/'+id+'/metadata/name').once('value');
                const o = document.createElement('option'); o.value = id; o.text = (s.val() || "רשימה");
                if(id === currentListId) o.selected = true; d.add(o);
            }
        }
        window.onload = () => { if(!localStorage.getItem('welcomeShown')) document.getElementById('welcomeModal').style.display = 'flex'; init(); };
    </script>
</body>
</html>
