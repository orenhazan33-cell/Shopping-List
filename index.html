<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>הקניות של אורן - הגרסה המלאה</title>
    <link rel="manifest" href="./manifest.json">
    <meta name="theme-color" content="#4a90e2">
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
    <style>
        :root { --primary: #4a90e2; --secondary: #2ecc71; --danger: #e74c3c; --share: #6c5ce7; }
        body { font-family: 'Segoe UI', system-ui, sans-serif; margin: 0; padding-bottom: 110px; background: #f4f7f9; direction: rtl; text-align: right; }
        
        /* מסך ברוכים הבאים משודרג */
        .modal-overlay { position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.85); z-index: 3000; display: none; align-items: center; justify-content: center; }
        .welcome-card { background: white; width: 92%; max-width: 400px; border-radius: 25px; padding: 25px; text-align: center; box-shadow: 0 15px 35px rgba(0,0,0,0.2); }
        .feature-item { display: flex; align-items: center; gap: 12px; margin-bottom: 12px; text-align: right; font-size: 14px; }
        
        .btn { padding: 12px; border: none; border-radius: 12px; cursor: pointer; font-weight: bold; width: 100%; font-size: 16px; margin-bottom: 10px; transition: 0.2s; }
        .btn-install { background: var(--secondary); color: white; border: 2px solid #27ae60; }
        .btn-start { background: var(--primary); color: white; }
        .btn-invite { background: #25D366; color: white; margin-top: 10px; display: flex; align-items: center; justify-content: center; gap: 8px; }

        .app-container { width: 95%; max-width: 500px; margin: 15px auto; }
        .control-panel { background: white; border-radius: 20px; padding: 18px; box-shadow: 0 8px 25px rgba(0,0,0,0.05); }
    </style>
</head>
<body>

    <div id="welcomeModal" class="modal-overlay">
        <div class="welcome-card">
            <h2 style="color: var(--primary); margin-top: 0;">היי! ברוכים הבאים 👋</h2>
            <div class="feature-item"><span>🧠</span> <strong>למידה עצמית:</strong> המערכת זוכרת מחירים ומוצרים.</div>
            <div class="feature-item"><span>🔔</span> <strong>תזכורת שכחה:</strong> תקבלו התראה אם מוצר עומד להיגמר.</div>
            <div class="feature-item"><span>📊</span> <strong>ניהול תקציב:</strong> חישוב עלות הסל בזמן אמת.</div>
            
            <hr style="border: 0; border-top: 1px solid #eee; margin: 15px 0;">
            
            <button id="installBtn" class="btn btn-install" onclick="installPWA()">📲 התקן אפליקציה למסך הבית</button>
            <button class="btn btn-start" onclick="closeWelcome()">אני כבר בפנים, בואו נתחיל</button>
            
            <button class="btn btn-invite" onclick="inviteFriends()">
                <span>💬 הזמן חברים להוריד</span>
            </button>
        </div>
    </div>

    <div class="app-container">
        <div class="control-panel">
             <input type="text" id="listNameInput" style="font-size:20px; font-weight:bold; border:none; width:100%;" onblur="saveListName(this.value)">
             <button class="btn" style="background:var(--share); color:white; font-size:13px; margin-top:10px;" onclick="shareCurrentList()">📤 שתף רשימה זו עם בני הבית</button>
        </div>
    </div>

    <script>
        // --- Firebase Config (תדאג שהפרטים שלך כאן) ---
        const firebaseConfig = {
            apiKey: "AIzaSyCb7dApdjqPB6Fip9rW-QxoNbTZBow6rkQ",
            authDomain: "shopping-list-7c4fa.firebaseapp.com",
            databaseURL: "https://shopping-list-7c4fa-default-rtdb.europe-west1.firebasedatabase.app",
            projectId: "shopping-list-7c4fa",
            storageBucket: "shopping-list-7c4fa.appspot.com",
            messagingSenderId: "482760938255",
            appId: "1:482760938255:web:99e0dd53cb822a8327e47a"
        };
        firebase.initializeApp(firebaseConfig);

        let deferredPrompt;

        // האזנה לאירוע התקנה (Android)
        window.addEventListener('beforeinstallprompt', (e) => {
            e.preventDefault();
            deferredPrompt = e;
            // הצגת כפתור ההתקנה אם המערכת תומכת
            document.getElementById('installBtn').style.display = 'block';
        });

        window.onload = function() {
            if (!localStorage.getItem('welcomeShown')) {
                document.getElementById('welcomeModal').style.display = 'flex';
            }
        };

        function closeWelcome() {
            localStorage.setItem('welcomeShown', 'true');
            document.getElementById('welcomeModal').style.display = 'none';
        }

        function installPWA() {
            if (deferredPrompt) {
                deferredPrompt.prompt();
                deferredPrompt.userChoice.then((choice) => {
                    if (choice.outcome === 'accepted') console.log('User installed');
                    deferredPrompt = null;
                });
            } else {
                // הוראות ל-iPhone
                alert("ב-iPhone: לחץ על כפתור השיתוף (ריבוע עם חץ) ואז בחר ב-'הוסף למסך הבית'.");
            }
        }

        function inviteFriends() {
            const cleanUrl = window.location.origin + window.location.pathname;
            const text = "היי! מצאתי אפליקציית קניות חכמה שלומדת אותך וחוסכת זמן. כדאי לך להתקין: " + cleanUrl;
            window.open("https://wa.me/?text=" + encodeURIComponent(text));
        }

        function shareCurrentList() {
            const url = window.location.href;
            if (navigator.share) {
                navigator.share({ title: 'בואו לעזור עם הקניות', url: url });
            } else {
                navigator.clipboard.writeText(url);
                alert("לינק לרשימה הועתק!");
            }
        }
    </script>
</body>
</html>
